<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XO Assistant — Sonki</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        
        :root {
            --bg: #06060d;
            --card: #0f0f1a;
            --text: #f0f0f5;
            --muted: #6b6b80;
            --x: #ff3b6e;
            --o: #4da6ff;
            --accent: #a855f7;
            --accent2: #06d6a0;
            --gold: #ffd166;
            --border: #1e1e30;
            --cell: #12121f;
            --glow-x: rgba(255,59,110,0.5);
            --glow-o: rgba(77,166,255,0.5);
            --glow-accent: rgba(168,85,247,0.4);
        }
        
        .light-theme {
            --bg: #fafafe;
            --card: #ffffff;
            --text: #1a1a2e;
            --muted: #8e8ea0;
            --border: #e8e8f0;
            --cell: #f4f4fa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s;
            overflow-x: hidden;
        }
        
        /* Анимированные частицы фона */
        .particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(2); opacity: 0; }
        }
        
        /* Градиентные орбы */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbMove 12s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--x); top: -10%; left: -5%; opacity: 0.2; animation-delay: 0s; }
        .orb-2 { width: 350px; height: 350px; background: var(--o); bottom: -10%; right: -5%; opacity: 0.2; animation-delay: -4s; }
        .orb-3 { width: 300px; height: 300px; background: var(--accent); top: 50%; left: 50%; opacity: 0.15; animation-delay: -8s; }
        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -30px) scale(1.3); }
            100% { transform: translate(-20px, 20px) scale(1.1); }
        }
        
        .theme-btn {
            position: fixed; top: 20px; right: 20px; z-index: 999;
            width: 48px; height: 48px; border-radius: 16px;
            background: var(--card); border: 2px solid var(--border);
            cursor: pointer; font-size: 1.3em;
            display: flex; align-items: center; justify-content: center;
            color: var(--text); transition: all 0.3s;
            backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .theme-btn:hover { transform: scale(1.08) rotate(5deg); border-color: var(--accent); box-shadow: 0 0 30px var(--glow-accent); }
        
        .container {
            position: relative; z-index: 10;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 32px;
            padding: 30px 24px;
            width: 95%;
            max-width: 460px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
            transition: all 0.5s;
            backdrop-filter: blur(10px);
        }
        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 34px;
            background: linear-gradient(135deg, var(--x), var(--accent), var(--o), var(--accent2));
            z-index: -1;
            opacity: 0.4;
            animation: borderGlow 6s ease-in-out infinite;
            filter: blur(8px);
        }
        @keyframes borderGlow {
            0%,100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        .logo {
            text-align: center; margin-bottom: 4px;
            font-size: 2.4em; font-weight: 900; letter-spacing: -2px;
        }
        .logo .x { color: var(--x); text-shadow: 0 0 40px var(--glow-x); animation: logoGlow 3s ease-in-out infinite; }
        .logo .o { color: var(--o); text-shadow: 0 0 40px var(--glow-o); animation: logoGlow 3s ease-in-out 0.5s infinite; }
        @keyframes logoGlow { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
        
        .badge {
            text-align: center; font-size: 0.68em; font-weight: 700;
            color: var(--muted); letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 22px;
        }
        
        .tabs {
            display: flex; gap: 4px; margin-bottom: 20px;
            background: var(--cell); border-radius: 16px; padding: 4px;
        }
        .tab {
            flex: 1; padding: 10px 4px; border: none; border-radius: 13px;
            background: transparent; color: var(--muted);
            cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.68em; font-weight: 700; transition: all 0.3s;
            text-align: center; letter-spacing: -0.3px;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--accent), var(--x));
            color: #fff; box-shadow: 0 6px 20px rgba(168,85,247,0.4);
            transform: scale(1.03);
        }
        .tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }
        
        .settings-row {
            display: flex; gap: 8px; margin-bottom: 10px;
        }
        .settings-row .btn {
            flex: 1; padding: 12px 10px;
            border: 2px solid var(--border); border-radius: 14px;
            background: var(--cell); color: var(--text);
            cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.78em; font-weight: 700;
            transition: all 0.3s; text-align: center;
        }
        .settings-row .btn:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .settings-row .btn.sel-x { background: var(--x); border-color: var(--x); color: #fff; box-shadow: 0 0 25px var(--glow-x); animation: btnPulse 2s ease-in-out infinite; }
        .settings-row .btn.sel-o { background: var(--o); border-color: var(--o); color: #fff; box-shadow: 0 0 25px var(--glow-o); animation: btnPulse 2s ease-in-out infinite; }
        .settings-row .btn.sel-first { background: linear-gradient(135deg, var(--accent), var(--x)); border-color: transparent; color: #fff; box-shadow: 0 0 25px var(--glow-accent); }
        @keyframes btnPulse { 0%,100% { box-shadow: 0 0 20px currentColor; } 50% { box-shadow: 0 0 40px currentColor, 0 0 60px currentColor; } }
        
        .label-sm {
            font-size: 0.68em; font-weight: 700; color: var(--muted);
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; display: block;
        }
        
        .board-wrap {
            background: var(--cell); border-radius: 22px;
            padding: 12px; margin: 18px 0;
            border: 2px solid var(--border);
            position: relative; overflow: hidden;
        }
        .board-wrap::after {
            content: ''; position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, var(--x), var(--accent), var(--o), var(--accent2), var(--gold), var(--x));
            animation: spin 10s linear infinite;
            opacity: 0; transition: opacity 0.5s; z-index: 0;
        }
        .board-wrap.thinking::after { opacity: 0.06; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .board {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; position: relative; z-index: 1;
        }
        .cell {
            aspect-ratio: 1;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.4em; font-weight: 900;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            color: var(--text); position: relative;
        }
        .cell:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .cell:active { transform: scale(0.93); }
        .cell.X { color: var(--x); text-shadow: 0 0 30px var(--glow-x); animation: popIn 0.4s cubic-bezier(0.4,0,0.2,1); }
        .cell.O { color: var(--o); text-shadow: 0 0 30px var(--glow-o); animation: popIn 0.4s cubic-bezier(0.4,0,0.2,1); }
        @keyframes popIn { 0% { transform: scale(1.4) rotate(15deg); opacity: 0; } 60% { transform: scale(0.95); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        
        .cell.hint {
            border-color: var(--accent2) !important;
            box-shadow: 0 0 35px rgba(6,214,160,0.4), inset 0 0 20px rgba(6,214,160,0.05);
            animation: hintPulse 1.2s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%,100% { box-shadow: 0 0 20px rgba(6,214,160,0.3); }
            50% { box-shadow: 0 0 50px rgba(6,214,160,0.6), 0 0 80px rgba(6,214,160,0.2); }
        }
        
        .cell.win-cell {
            animation: winBounce 0.4s ease-in-out infinite alternate;
            border-color: var(--accent2) !important;
        }
        @keyframes winBounce {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--accent2); }
            100% { transform: scale(1.07); box-shadow: 0 0 50px var(--accent2), 0 0 80px rgba(6,214,160,0.5); }
        }
        
        .turn-bar { display: flex; gap: 8px; margin-bottom: 12px; }
        .turn-item {
            flex: 1; padding: 10px; border-radius: 14px;
            background: var(--cell); text-align: center;
            font-size: 0.7em; font-weight: 700; color: var(--muted);
            transition: all 0.3s; border: 2px solid transparent;
        }
        .turn-item.active {
            border-color: var(--accent); color: var(--text);
            background: var(--card); box-shadow: 0 0 25px var(--glow-accent);
            animation: turnGlow 1.5s ease-in-out infinite;
        }
        @keyframes turnGlow { 0%,100% { box-shadow: 0 0 15px var(--glow-accent); } 50% { box-shadow: 0 0 35px var(--glow-accent); } }
        
        .status-msg {
            text-align: center; padding: 14px; margin: 10px 0;
            background: var(--cell); border-radius: 14px;
            color: var(--text); font-size: 0.8em; font-weight: 700;
            border: 1px solid var(--border);
        }
        
        .btn-main {
            width: 100%; padding: 15px;
            background: var(--cell); border: 2px solid var(--border);
            border-radius: 16px; color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.8em; font-weight: 800; cursor: pointer;
            letter-spacing: 1.5px; transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn-main:hover { border-color: var(--x); background: var(--card); box-shadow: 0 0 30px rgba(255,59,110,0.2); transform: translateY(-2px); }
        
        .room-box {
            background: var(--cell); border-radius: 16px;
            padding: 16px; margin-bottom: 12px;
            text-align: center; font-size: 0.72em; color: var(--text);
            border: 1px solid var(--border);
        }
        .room-box .code {
            font-size: 1.6em; font-weight: 900; letter-spacing: 3px;
            color: var(--accent2); margin: 8px 0;
            text-shadow: 0 0 30px rgba(6,214,160,0.4);
        }
        .room-box input {
            width: 100%; padding: 11px; margin: 8px 0;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.75em; text-align: center; outline: none;
        }
        .btn-copy {
            display: inline-block; padding: 12px 22px;
            background: linear-gradient(135deg, var(--accent), var(--x));
            border: none; border-radius: 12px; color: #fff;
            cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.78em; font-weight: 800; transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(168,85,247,0.3);
        }
        .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(168,85,247,0.5); }
        
        .chat-box {
            background: var(--cell); border-radius: 16px;
            padding: 14px; margin-top: 10px; border: 1px solid var(--border);
        }
        .chat-msgs {
            height: 100px; overflow-y: auto; margin-bottom: 8px;
            padding: 8px; background: var(--card); border-radius: 10px;
        }
        .chat-msg {
            font-size: 0.68em; margin-bottom: 5px;
            padding: 7px 12px; background: var(--cell);
            border-radius: 10px; color: var(--text);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .chat-msg.me { border-left: 3px solid var(--x); }
        .chat-msg.they { border-left: 3px solid var(--accent2); }
        .chat-row { display: flex; gap: 6px; }
        .chat-input {
            flex: 1; padding: 11px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.7em; outline: none;
        }
        .chat-send {
            padding: 11px 16px;
            background: linear-gradient(135deg, var(--accent), var(--x));
            border: none; border-radius: 12px; color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800; cursor: pointer; font-size: 0.78em;
            transition: all 0.3s;
        }
        .chat-send:hover { transform: scale(1.05); }
        
        .hidden { display: none !important; }
        .footer {
            text-align: center; margin-top: 14px;
            color: var(--muted); font-size: 0.6em; letter-spacing: 2px;
        }
        
        @media (max-width: 400px) {
            .container { padding: 20px 14px; border-radius: 24px; }
            .cell { font-size: 2em; border-radius: 12px; }
            .tab { font-size: 0.6em; padding: 8px 2px; }
        }
    </style>
</head>
<body>
    <!-- Фоновые орбы -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="particles" id="particles"></div>
    
    <button class="theme-btn" onclick="toggleTheme()" id="tBtn">🌙</button>
    
    <div class="container">
        <div class="logo"><span class="x">X</span><span class="o">O</span></div>
        <div class="badge">Assistant</div>
        
        <div class="tabs">
            <button class="tab active" onclick="sw('calc')">Ассистент</button>
            <button class="tab" onclick="sw('ai')">ИИ</button>
            <button class="tab" onclick="sw('friend')">Рядом</button>
            <button class="tab" onclick="sw('online')">Онлайн</button>
        </div>
        
        <div id="settings">
            <div id="symBlock"><span class="label-sm">Вы играете за</span>
                <div class="settings-row">
                    <button class="btn" id="bX" onclick="chSym('X')">✕ Крестик</button>
                    <button class="btn" id="bO" onclick="chSym('O')">○ Нолик</button>
                </div>
            </div>
            <div id="firstBlock"><span class="label-sm">Первый ход</span>
                <div class="settings-row">
                    <button class="btn" id="bMe" onclick="chFirst('me')">Я</button>
                    <button class="btn" id="bOp" onclick="chFirst('opp')">Соперник</button>
                </div>
            </div>
        </div>
        
        <div class="room-box hidden" id="roomBox"></div>
        
        <div class="turn-bar hidden" id="turnBar">
            <div class="turn-item active" id="tYou">Вы</div>
            <div class="turn-item" id="tThem">Соперник</div>
        </div>
        
        <div class="board-wrap" id="bw">
            <div class="board" id="board">
                <div class="cell" onclick="clickCell(0)"></div><div class="cell" onclick="clickCell(1)"></div><div class="cell" onclick="clickCell(2)"></div>
                <div class="cell" onclick="clickCell(3)"></div><div class="cell" onclick="clickCell(4)"></div><div class="cell" onclick="clickCell(5)"></div>
                <div class="cell" onclick="clickCell(6)"></div><div class="cell" onclick="clickCell(7)"></div><div class="cell" onclick="clickCell(8)"></div>
            </div>
        </div>
        
        <div class="chat-box hidden" id="chatBox">
            <div class="chat-msgs" id="chatMsgs"></div>
            <div class="chat-row">
                <input class="chat-input" id="chatIn" placeholder="Сообщение...">
                <button class="chat-send" onclick="sendChat()">→</button>
            </div>
        </div>
        
        <div class="status-msg" id="status">Выберите режим</div>
        
        <button class="btn-main" onclick="resetGame()">Новая игра</button>
        <div class="footer">made by sonki</div>
    </div>
    
    <script>
        // Частицы фона
        (function(){
            const c=document.getElementById('particles');
            const colors=['#ff3b6e','#4da6ff','#a855f7','#06d6a0','#ffd166'];
            for(let i=0;i<50;i++){
                const p=document.createElement('div');
                p.className='particle';
                p.style.left=Math.random()*100+'%';
                p.style.width=p.style.height=(Math.random()*3+2)+'px';
                p.style.background=colors[Math.floor(Math.random()*colors.length)];
                p.style.animationDuration=(Math.random()*10+8)+'s';
                p.style.animationDelay=Math.random()*8+'s';
                p.style.boxShadow=`0 0 ${Math.random()*8+4}px ${p.style.background}`;
                c.appendChild(p);
            }
        })();
        
        // Тема
        let dark=true;
        function toggleTheme(){dark=!dark;document.body.className=dark?'':'light-theme';document.getElementById('tBtn').textContent=dark?'🌙':'☀️';localStorage.setItem('xo-theme2',dark?'dark':'light')}
        if(localStorage.getItem('xo-theme2')==='light'){dark=false;document.body.className='light-theme';document.getElementById('tBtn').textContent='☀️'}
        
        let pSym=null,oSym=null,first=null;
        let board=['','','','','','','','',''];
        let active=false,waiting=false,mode='calc';
        let _oc=null,_rid=null,_pid=null;
        
        function sw(m){
            if(_oc){window.supabase.removeChannel(_oc);_oc=null}
            mode=m;
            document.querySelectorAll('.tab').forEach((t,i)=>t.className=['calc','ai','friend','online'][i]===m?'tab active':'tab');
            const sb=document.getElementById('symBlock'),fb=document.getElementById('firstBlock'),rb=document.getElementById('roomBox'),tb=document.getElementById('turnBar'),cb=document.getElementById('chatBox');
            board=['','','','','','','','',''];active=false;waiting=false;updateB();clearH();
            if(m==='ai'){sb.classList.add('hidden');fb.classList.add('hidden');rb.classList.add('hidden');tb.classList.add('hidden');cb.classList.add('hidden');pSym='X';oSym='O';active=true;setS('Ваш ход')}
            else if(m==='friend'){sb.classList.add('hidden');fb.classList.add('hidden');rb.classList.add('hidden');tb.classList.remove('hidden');cb.classList.add('hidden');pSym='X';oSym='O';active=true;upTurn('X');setS('Ходит ✕')}
            else if(m==='online'){sb.classList.add('hidden');fb.classList.add('hidden');rb.classList.remove('hidden');tb.classList.remove('hidden');cb.classList.remove('hidden');
                // Проверяем есть ли room в URL
                const p=new URLSearchParams(window.location.search);
                if(p.get('room')) initOnline();
                else initOnline();
            }
            else{sb.classList.remove('hidden');fb.classList.remove('hidden');rb.classList.add('hidden');tb.classList.add('hidden');cb.classList.add('hidden');pSym=null;oSym=null;first=null;document.getElementById('bX').className='btn';document.getElementById('bO').className='btn';document.getElementById('bMe').className='btn';document.getElementById('bOp').className='btn';setS('Выберите настройки')}
        }
        
        // Автоматический переход в онлайн если есть room в URL
        (function(){
            const p=new URLSearchParams(window.location.search);
            if(p.get('room')){sw('online');}
        })();
        
        function upTurn(s){
            document.getElementById('tYou').className='turn-item';
            document.getElementById('tThem').className='turn-item';
            if(s===pSym||s===_pid) document.getElementById('tYou').classList.add('active');
            else document.getElementById('tThem').classList.add('active');
        }
        
        function clickCell(i){
            if(!active||board[i]!=='') return;
            if(mode==='online'){if(waiting)return;onlineClick(i);return}
            if(mode==='ai'){board[i]=pSym;updateB();if(win(pSym)){hw(pSym);setS('Победа!');active=false;spawnWinEffect();return}if(full()){setS('Ничья');active=false;return}setS('ИИ думает...');document.getElementById('bw').classList.add('thinking');setTimeout(()=>{const m=aiMove();document.getElementById('bw').classList.remove('thinking');if(m!==null){board[m]=oSym;updateB();if(win(oSym)){hw(oSym);setS('ИИ выиграл');active=false}else if(full()){setS('Ничья');active=false}else setS('Ваш ход')}},400);return}
            if(mode==='friend'){const mv=board.filter(c=>c!=='').length,s=mv%2===0?'X':'O';board[i]=s;updateB();if(win(s)){hw(s);setS(s+' выиграл!');active=false;spawnWinEffect();return}if(full()){setS('Ничья');active=false;return}const nx=mv%2===0?'○':'✕';upTurn(nx==='✕'?'X':'O');setS('Ходит '+nx);return}
            if(mode==='calc'&&waiting){board[i]=oSym;updateB();waiting=false;clearH();if(win(oSym)){hw(oSym);setS('Соперник выиграл');active=false;return}if(full()){setS('Ничья');active=false;return}setS('Просчитываю...');setTimeout(()=>makeHint(),400)}
        }
        
        function spawnWinEffect(){
            // Создаём вспышку
            const bw=document.getElementById('bw');
            bw.style.transition='all 0.3s';
            bw.style.boxShadow='0 0 80px var(--accent2), 0 0 150px rgba(6,214,160,0.4)';
            setTimeout(()=>{bw.style.boxShadow='';bw.style.transition='';},800);
        }
        
        function makeHint(){if(!active)return;const m=bestMove();if(m!==null){hintCell(m);setS('Ваш ход → клетка '+(m+1));setTimeout(()=>{board[m]=pSym;updateB();clearH();if(win(pSym)){hw(pSym);setS('Победа!');active=false;spawnWinEffect();return}if(full()){setS('Ничья');active=false;return}setS('Ход соперника');waiting=true},700)}}
        
        function aiMove(){if(Math.random()<0.2){const e=[];for(let i=0;i<9;i++)if(board[i]==='')e.push(i);if(e.length)return e[Math.floor(Math.random()*e.length)]}return bestMove()}
        
        function bestMove(){
            for(let i=0;i<9;i++){if(board[i]===''){board[i]=pSym;if(win(pSym)){board[i]='';return i}board[i]=''}}
            for(let i=0;i<9;i++){if(board[i]===''){board[i]=oSym;if(win(oSym)){board[i]='';return i}board[i]=''}}
            if(board[4]==='')return 4;
            for(let c of[0,2,6,8])if(board[c]==='')return c;
            for(let i=0;i<9;i++)if(board[i]==='')return i;
            return null;
        }
        
        function win(s){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return p.some(w=>w.every(i=>board[i]===s))}
        function hw(s){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let w of p){if(w.every(i=>board[i]===s)){document.querySelectorAll('.cell').forEach((c,i)=>{if(w.includes(i))c.classList.add('win-cell')});break}}}
        function full(){return board.every(c=>c!=='')}
        function hintCell(i){clearH();document.querySelectorAll('.cell')[i].classList.add('hint')}
        function clearH(){document.querySelectorAll('.cell').forEach(c=>c.classList.remove('hint','win-cell'))}
        function updateB(){document.querySelectorAll('.cell').forEach((c,i)=>{c.textContent=board[i];c.className='cell';if(board[i]==='X')c.classList.add('X');if(board[i]==='O')c.classList.add('O')})}
        function setS(m){document.getElementById('status').textContent=m}
        
        function chSym(s){if(mode!=='calc'||active)return;pSym=s;oSym=s==='X'?'O':'X';document.getElementById('bX').className=s==='X'?'btn sel-x':'btn';document.getElementById('bO').className=s==='O'?'btn sel-o':'btn';if(first)startCalc()}
        function chFirst(w){if(mode!=='calc'||active)return;first=w;document.getElementById('bMe').className=w==='me'?'btn sel-first':'btn';document.getElementById('bOp').className=w==='opp'?'btn sel-first':'btn';if(pSym)startCalc()}
        function startCalc(){active=true;board=['','','','','','','','',''];waiting=false;updateB();clearH();if(first==='opp'){setS('Ход соперника');waiting=true}else{setS('Просчитываю...');setTimeout(()=>makeHint(),500)}}
        
        function resetGame(){
            board=['','','','','','','','',''];updateB();clearH();
            if(mode==='online'){
                active=true;waiting=_pid==='O';
                upTurn(waiting?'O':_pid);
                setS(waiting?'Ход соперника':'Ваш ход');
                broadcast({action:'reset'});
                if(!waiting) broadcast({action:'move',board:board,turn:_pid==='X'?'O':'X'});
            }else if(mode==='ai'){active=true;pSym='X';oSym='O';setS('Ваш ход')}
            else if(mode==='friend'){active=true;upTurn('X');setS('Ходит ✕')}
            else{active=false;waiting=false;if(pSym&&first)startCalc();else setS('Выберите настройки')}
        }
        
        // Online
        function initOnline(){
            if(!window.supabase){document.getElementById('roomBox').innerHTML='<div class="room-box">Загрузка...</div>';loadSB();return}
            setupOL();
        }
        function loadSB(){
            const s=document.createElement('script');
            s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            s.onload=()=>{window.supabase=supabase.createClient('https://mvnmqtvdazrrcrufaely.supabase.co','sb_publishable_oVIxgyYQvjTUkXJ4QQ24CQ_30pbjVm7');setupOL()};
            s.onerror=()=>{document.getElementById('roomBox').innerHTML='<div class="room-box">Ошибка загрузки</div>'};
            document.head.appendChild(s);
        }
        function setupOL(){
            const p=new URLSearchParams(window.location.search),j=p.get('room');
            if(j){_rid=j;_pid='O';document.getElementById('tYou').textContent='Вы (○)';document.getElementById('tThem').textContent='Игрок 1 (✕)';joinRoom();}
            else{_rid=Math.random().toString(36).substr(2,6);_pid='X';document.getElementById('tYou').textContent='Вы (✕)';document.getElementById('tThem').textContent='Игрок 2 (○)';createRoom();}
        }
        async function createRoom(){
            const l=window.location.origin+window.location.pathname+'?room='+_rid;
            document.getElementById('roomBox').innerHTML=`<div class="room-box">Код комнаты<div class="code">${_rid}</div><input value="${l}" readonly onclick="this.select()"><button class="btn-copy" onclick="copyLink()">Копировать ссылку</button></div>`;
            try{await window.supabase.from('games').upsert({id:_rid,board:'["","","","","","","","",""]',turn:'X',chat:'[]',status:'waiting'})}catch(e){}
            subRoom();active=true;upTurn('X');setS('Ожидание соперника...');
        }
        async function joinRoom(){
            try{
                const {data}=await window.supabase.from('games').select('*').eq('id',_rid).single();
                if(data){
                    await window.supabase.from('games').update({status:'playing'}).eq('id',_rid);
                    // Скрываем ссылку и показываем что подключен
                    document.getElementById('roomBox').innerHTML='<div class="room-box">Соперник подключен!</div>';
                    setTimeout(()=>{document.getElementById('roomBox').classList.add('hidden')},1500);
                    subRoom();active=true;waiting=true;upTurn('X');setS('Ход соперника (✕)');
                }else document.getElementById('roomBox').innerHTML='<div class="room-box">Комната не найдена</div>';
            }catch(e){document.getElementById('roomBox').innerHTML='<div class="room-box">Ошибка</div>';}
        }
        function subRoom(){
            if(_oc) window.supabase.removeChannel(_oc);
            _oc=window.supabase.channel('room_'+_rid)
            .on('broadcast',{event:'move'},(p)=>{
                const d=p.payload;
                if(d.action==='reset'){
                    board=['','','','','','','','',''];updateB();clearH();
                    active=true;waiting=_pid==='O';
                    upTurn(waiting?'O':_pid);
                    setS(waiting?'Ход соперника':'Ваш ход');
                    return;
                }
                board=d.board;updateB();clearH();
                if(d.winner){hw(d.winner);setS(d.winner===_pid?'Вы победили!':'Соперник победил');active=false;spawnWinEffect();}
                else if(full()){setS('Ничья');active=false}
                else{waiting=d.turn!==_pid;upTurn(d.turn);setS(waiting?'Ход соперника':'Ваш ход')}
            })
            .on('broadcast',{event:'chat'},(p)=>{
                const m=p.payload,c=document.getElementById('chatMsgs'),cl=m.player===_pid?'chat-msg me':'chat-msg they';
                c.innerHTML+=`<div class="${cl}"><b>${m.player===_pid?'Вы':(_pid==='X'?'Игрок 2':'Игрок 1')}:</b> ${m.text}</div>`;c.scrollTop=c.scrollHeight;
            })
            .subscribe();
        }
        function copyLink(){const i=document.querySelector('.room-box input');if(i){i.select();navigator.clipboard.writeText(i.value);setS('Ссылка скопирована!')}}
        async function sendChat(){const i=document.getElementById('chatIn'),t=i.value.trim();if(!t||!_oc)return;await _oc.send({type:'broadcast',event:'chat',payload:{player:_pid,text:t}});const c=document.getElementById('chatMsgs');c.innerHTML+=`<div class="chat-msg me"><b>Вы:</b> ${t}</div>`;c.scrollTop=c.scrollHeight;i.value=''}
        async function broadcast(d){if(!_oc)return;await _oc.send({type:'broadcast',event:'move',payload:d})}
        function onlineClick(i){
            board[i]=_pid;updateB();
            if(win(_pid)){hw(_pid);setS('Вы победили!');active=false;spawnWinEffect();broadcast({action:'move',board:board,turn:_pid,winner:_pid});return}
            if(full()){setS('Ничья');active=false;broadcast({action:'move',board:board,turn:_pid,winner:null});return}
            waiting=true;upTurn(_pid==='X'?'O':'X');setS('Ход соперника');
            broadcast({action:'move',board:board,turn:_pid==='X'?'O':'X',winner:null});
        }
        
        updateB();setS('Выберите режим');
    </script>
</body>
</html>
