<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XO Assistant — Sonki</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
        
        :root {
            --bg: #050510;
            --card: #0a0a1e;
            --text: #e8e8f0;
            --muted: #7a7a9e;
            --x: #ff4472;
            --o: #5b9eff;
            --accent: #b347ea;
            --accent2: #00e5a0;
            --gold: #ffd166;
            --border: #1a1a35;
            --cell: #0d0d25;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Космический фон */
        .stars {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.8); }
        }
        
        /* Сатурн */
        .saturn-container {
            position: fixed;
            bottom: -180px;
            right: -120px;
            z-index: 0;
            pointer-events: none;
            animation: saturnFloat 20s ease-in-out infinite;
        }
        .saturn {
            width: 260px;
            height: 260px;
            position: relative;
        }
        .saturn-planet {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 40% 40%, #f5d5a0, #c4944a, #8b5e2b);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 60px rgba(245,213,160,0.3), inset 0 -10px 20px rgba(0,0,0,0.4);
        }
        .saturn-ring {
            width: 200px;
            height: 200px;
            border: 12px solid transparent;
            border-top: 8px solid rgba(245,213,160,0.6);
            border-right: 8px solid rgba(210,180,140,0.4);
            border-bottom: 4px solid rgba(245,213,160,0.2);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            box-shadow: 0 0 30px rgba(245,213,160,0.2);
            animation: ringGlow 4s ease-in-out infinite;
        }
        @keyframes ringGlow {
            0%,100% { box-shadow: 0 0 20px rgba(245,213,160,0.2); }
            50% { box-shadow: 0 0 50px rgba(245,213,160,0.5); }
        }
        @keyframes saturnFloat {
            0%,100% { transform: translate(0,0) rotate(-5deg); }
            25% { transform: translate(-20px,-15px) rotate(-3deg); }
            50% { transform: translate(-10px,-30px) rotate(-8deg); }
            75% { transform: translate(10px,-10px) rotate(-4deg); }
        }
        
        /* Небула */
        .nebula {
            position: fixed;
            top: -200px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(179,71,234,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: nebulaPulse 8s ease-in-out infinite;
        }
        .nebula2 {
            position: fixed;
            bottom: -150px;
            left: 30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(255,68,114,0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: nebulaPulse 10s ease-in-out 2s infinite;
        }
        @keyframes nebulaPulse {
            0%,100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        
        .container {
            position: relative; z-index: 10;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px 20px;
            width: 95%;
            max-width: 440px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(179,71,234,0.1) inset;
            backdrop-filter: blur(20px);
        }
        
        .logo {
            text-align: center; margin-bottom: 2px;
            font-size: 2.2em; font-weight: 700; letter-spacing: -1px;
        }
        .logo .x { color: var(--x); text-shadow: 0 0 30px rgba(255,68,114,0.6); }
        .logo .o { color: var(--o); text-shadow: 0 0 30px rgba(91,158,255,0.6); }
        
        .badge {
            text-align: center; font-size: 0.6em; font-weight: 600;
            color: var(--muted); letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 18px;
        }
        
        .tabs {
            display: flex; gap: 3px; margin-bottom: 16px;
            background: var(--cell); border-radius: 14px; padding: 3px;
        }
        .tab {
            flex: 1; padding: 9px 3px; border: none; border-radius: 12px;
            background: transparent; color: var(--muted);
            cursor: pointer; font-family: 'Space Grotesk', sans-serif;
            font-size: 0.6em; font-weight: 600; transition: all 0.3s;
            text-align: center; letter-spacing: -0.2px;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--accent), #c44dff);
            color: #fff; box-shadow: 0 4px 15px rgba(179,71,234,0.4);
        }
        .tab:hover:not(.active) { color: var(--text); }
        
        .settings-row {
            display: flex; gap: 6px; margin-bottom: 8px;
        }
        .settings-row .btn {
            flex: 1; padding: 10px 8px;
            border: 1px solid var(--border); border-radius: 12px;
            background: var(--cell); color: var(--text);
            cursor: pointer; font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7em; font-weight: 600;
            transition: all 0.3s; text-align: center;
        }
        .settings-row .btn:hover { border-color: var(--accent); }
        .settings-row .btn.sel-x { background: var(--x); border-color: var(--x); color: #fff; box-shadow: 0 0 20px rgba(255,68,114,0.4); }
        .settings-row .btn.sel-o { background: var(--o); border-color: var(--o); color: #fff; box-shadow: 0 0 20px rgba(91,158,255,0.4); }
        .settings-row .btn.sel-first { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 20px rgba(179,71,234,0.4); }
        
        .label-sm {
            font-size: 0.6em; font-weight: 600; color: var(--muted);
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; display: block;
        }
        
        .board-wrap {
            background: var(--cell); border-radius: 20px;
            padding: 10px; margin: 14px 0;
            border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .board {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; position: relative; z-index: 1;
        }
        .cell {
            aspect-ratio: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2em; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            color: var(--text);
        }
        .cell:active { transform: scale(0.94); }
        .cell.X { color: var(--x); text-shadow: 0 0 25px rgba(255,68,114,0.5); animation: pop 0.35s ease; }
        .cell.O { color: var(--o); text-shadow: 0 0 25px rgba(91,158,255,0.5); animation: pop 0.35s ease; }
        @keyframes pop { 0% { transform: scale(1.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .cell.hint {
            border-color: var(--accent2) !important;
            box-shadow: 0 0 25px rgba(0,229,160,0.3);
            animation: hintPulse 1.2s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%,100% { box-shadow: 0 0 15px rgba(0,229,160,0.2); }
            50% { box-shadow: 0 0 40px rgba(0,229,160,0.5); }
        }
        .cell.win-cell {
            animation: winBounce 0.4s ease-in-out infinite alternate;
            border-color: var(--accent2) !important;
        }
        @keyframes winBounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); box-shadow: 0 0 30px rgba(0,229,160,0.5); }
        }
        
        .turn-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .turn-dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--cell); border: 2px solid var(--border);
            transition: all 0.3s;
        }
        .turn-dot.active-you { background: var(--x); border-color: var(--x); box-shadow: 0 0 15px rgba(255,68,114,0.5); }
        .turn-dot.active-them { background: var(--o); border-color: var(--o); box-shadow: 0 0 15px rgba(91,158,255,0.5); }
        
        .status-msg {
            text-align: center; padding: 11px; margin: 8px 0;
            background: var(--cell); border-radius: 12px;
            color: var(--text); font-size: 0.7em; font-weight: 600;
            border: 1px solid var(--border);
        }
        
        .btn-main {
            width: 100%; padding: 13px;
            background: var(--cell); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7em; font-weight: 600; cursor: pointer;
            letter-spacing: 1.5px; transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn-main:hover { border-color: var(--accent); }
        
        .room-box {
            background: var(--cell); border-radius: 14px;
            padding: 14px; margin-bottom: 10px;
            text-align: center; font-size: 0.65em; color: var(--text);
            border: 1px solid var(--border);
        }
        .room-box .code {
            font-size: 1.4em; font-weight: 700; letter-spacing: 2px;
            color: var(--accent2); margin: 6px 0;
        }
        .room-box input {
            width: 100%; padding: 9px; margin: 6px 0;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7em; text-align: center; outline: none;
        }
        .btn-copy {
            display: inline-block; padding: 10px 20px;
            background: var(--accent); border: none; border-radius: 10px;
            color: #fff; cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7em; font-weight: 600; transition: all 0.3s;
        }
        .btn-copy:hover { opacity: 0.9; }
        
        .chat-box {
            background: var(--cell); border-radius: 14px;
            padding: 10px; margin-top: 8px; border: 1px solid var(--border);
        }
        .chat-msgs {
            height: 80px; overflow-y: auto; margin-bottom: 6px;
            padding: 6px; background: var(--card); border-radius: 8px;
        }
        .chat-msg {
            font-size: 0.6em; margin-bottom: 3px;
            padding: 5px 8px; background: var(--cell);
            border-radius: 8px; color: var(--text);
        }
        .chat-msg.me { border-left: 2px solid var(--x); }
        .chat-msg.they { border-left: 2px solid var(--accent2); }
        .chat-row { display: flex; gap: 4px; }
        .chat-input {
            flex: 1; padding: 9px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.6em; outline: none;
        }
        .chat-send {
            padding: 9px 12px;
            background: var(--accent); border: none; border-radius: 10px;
            color: #fff; font-family: 'Space Grotesk', sans-serif;
            font-weight: 600; cursor: pointer; font-size: 0.7em;
        }
        
        .hidden { display: none !important; }
        
        .footer {
            text-align: center; margin-top: 12px;
            color: var(--muted); font-size: 0.55em; letter-spacing: 2px;
            cursor: default; user-select: none;
        }
        .footer span { transition: color 0.3s; }
        .footer span:active { color: var(--x); }
        
        @media (max-width: 400px) {
            .container { padding: 18px 12px; }
            .cell { font-size: 1.8em; }
            .tab { font-size: 0.55em; }
        }
    </style>
</head>
<body>
    <!-- Космический фон -->
    <div class="stars" id="stars"></div>
    <div class="nebula"></div>
    <div class="nebula2"></div>
    <div class="saturn-container">
        <div class="saturn">
            <div class="saturn-planet"></div>
            <div class="saturn-ring"></div>
        </div>
    </div>
    
    <div class="container">
        <div class="logo"><span class="x">X</span><span class="o">O</span></div>
        <div class="badge">Assistant</div>
        
        <div class="tabs">
            <button class="tab active" onclick="sw('calc')">Ассистент</button>
            <button class="tab" onclick="sw('ai')">ИИ</button>
            <button class="tab" onclick="sw('friend')">1 экран</button>
            <button class="tab" onclick="sw('online')">Онлайн</button>
        </div>
        
        <div id="settings">
            <div id="symBlock"><span class="label-sm">Вы играете за</span>
                <div class="settings-row">
                    <button class="btn" id="bX" onclick="chSym('X')">✕ Крестик</button>
                    <button class="btn" id="bO" onclick="chSym('O')">○ Нолик</button>
                </div>
            </div>
            <div id="firstBlock"><span class="label-sm">Первый ход</span>
                <div class="settings-row">
                    <button class="btn" id="bMe" onclick="chFirst('me')">Я</button>
                    <button class="btn" id="bOp" onclick="chFirst('opp')">Соперник</button>
                </div>
            </div>
        </div>
        
        <div class="room-box hidden" id="roomBox"></div>
        
        <div class="turn-bar hidden" id="turnBar">
            <div class="turn-dot active-you" id="dY"></div>
            <div class="turn-dot" id="dO"></div>
        </div>
        
        <div class="board-wrap">
            <div class="board" id="board">
                <div class="cell" onclick="clickCell(0)"></div><div class="cell" onclick="clickCell(1)"></div><div class="cell" onclick="clickCell(2)"></div>
                <div class="cell" onclick="clickCell(3)"></div><div class="cell" onclick="clickCell(4)"></div><div class="cell" onclick="clickCell(5)"></div>
                <div class="cell" onclick="clickCell(6)"></div><div class="cell" onclick="clickCell(7)"></div><div class="cell" onclick="clickCell(8)"></div>
            </div>
        </div>
        
        <div class="chat-box hidden" id="chatBox">
            <div class="chat-msgs" id="chatMsgs"></div>
            <div class="chat-row">
                <input class="chat-input" id="chatIn" placeholder="Сообщение...">
                <button class="chat-send" onclick="sendChat()">→</button>
            </div>
        </div>
        
        <div class="status-msg" id="status">Выберите режим</div>
        
        <button class="btn-main" onclick="resetGame()">Новая игра</button>
        <div class="footer"><span onclick="rickroll()">made by sonki</span></div>
    </div>
    
    <script>
        // Звёзды
        (function(){
            const c=document.getElementById('stars');
            for(let i=0;i<120;i++){
                const s=document.createElement('div');
                s.className='star';
                s.style.left=Math.random()*100+'%';
                s.style.top=Math.random()*100+'%';
                s.style.width=s.style.height=(Math.random()*2+0.5)+'px';
                s.style.animationDuration=(Math.random()*3+2)+'s';
                s.style.animationDelay=Math.random()*3+'s';
                c.appendChild(s);
            }
        })();
        
        // Рикролл
        function rickroll(){
            window.open('https://youtu.be/dQw4w9WgXcQ?si=DC5XtVJFjfdoE-Ma','_blank');
        }
        
        let pSym=null,oSym=null,first=null;
        let board=['','','','','','','','',''];
        let active=false,waiting=false,mode='calc';
        let _oc=null,_rid=null,_pid=null;
        
        function sw(m){
            if(_oc){window.supabase.removeChannel(_oc);_oc=null}
            mode=m;
            document.querySelectorAll('.tab').forEach((t,i)=>t.className=['calc','ai','friend','online'][i]===m?'tab active':'tab');
            const sb=document.getElementById('symBlock'),fb=document.getElementById('firstBlock'),rb=document.getElementById('roomBox'),tb=document.getElementById('turnBar'),cb=document.getElementById('chatBox');
            board=['','','','','','','','',''];active=false;waiting=false;updateB();clearH();
            if(m==='ai'){sb.classList.add('hidden');fb.classList.add('hidden');rb.classList.add('hidden');tb.classList.add('hidden');cb.classList.add('hidden');pSym='X';oSym='O';active=true;setS('Ваш ход')}
            else if(m==='friend'){sb.classList.add('hidden');fb.classList.add('hidden');rb.classList.add('hidden');tb.classList.remove('hidden');cb.classList.add('hidden');pSym='X';oSym='O';active=true;upTurn('X');setS('Ходит ✕')}
            else if(m==='online'){sb.classList.add('hidden');fb.classList.add('hidden');rb.classList.remove('hidden');tb.classList.remove('hidden');cb.classList.remove('hidden');initOnline();}
            else{sb.classList.remove('hidden');fb.classList.remove('hidden');rb.classList.add('hidden');tb.classList.add('hidden');cb.classList.add('hidden');pSym=null;oSym=null;first=null;document.getElementById('bX').className='btn';document.getElementById('bO').className='btn';document.getElementById('bMe').className='btn';document.getElementById('bOp').className='btn';setS('Выберите настройки')}
        }
        
        // Авто-онлайн
        (function(){const p=new URLSearchParams(window.location.search);if(p.get('room'))sw('online');})();
        
        function upTurn(s){
            const dy=document.getElementById('dY'),dp=document.getElementById('dO');
            dy.className='turn-dot';dp.className='turn-dot';
            if(s===pSym||s===_pid){dy.classList.add('active-you');}else{dp.classList.add('active-them');}
        }
        
        function clickCell(i){
            if(!active||board[i]!=='') return;
            if(mode==='online'){if(waiting)return;onlineClick(i);return}
            if(mode==='ai'){board[i]=pSym;updateB();if(win(pSym)){hw(pSym);setS('Победа!');active=false;return}if(full()){setS('Ничья');active=false;return}setS('ИИ думает...');setTimeout(()=>{const m=aiMove();if(m!==null){board[m]=oSym;updateB();if(win(oSym)){hw(oSym);setS('ИИ выиграл');active=false}else if(full()){setS('Ничья');active=false}else setS('Ваш ход')}},350);return}
            if(mode==='friend'){const mv=board.filter(c=>c!=='').length,s=mv%2===0?'X':'O';board[i]=s;updateB();if(win(s)){hw(s);setS(s+' выиграл!');active=false;return}if(full()){setS('Ничья');active=false;return}const nx=mv%2===0?'○':'✕';upTurn(nx==='✕'?'X':'O');setS('Ходит '+nx);return}
            if(mode==='calc'&&waiting){board[i]=oSym;updateB();waiting=false;clearH();if(win(oSym)){hw(oSym);setS('Соперник выиграл');active=false;return}if(full()){setS('Ничья');active=false;return}setS('Просчитываю...');setTimeout(()=>makeHint(),400)}
        }
        
        function makeHint(){if(!active)return;const m=bestMove();if(m!==null){hintCell(m);setS('Ход на клетку '+(m+1));setTimeout(()=>{board[m]=pSym;updateB();clearH();if(win(pSym)){hw(pSym);setS('Победа!');active=false;return}if(full()){setS('Ничья');active=false;return}setS('Ход соперника');waiting=true},700)}}
        
        function aiMove(){if(Math.random()<0.2){const e=[];for(let i=0;i<9;i++)if(board[i]==='')e.push(i);if(e.length)return e[Math.floor(Math.random()*e.length)]}return bestMove()}
        
        function bestMove(){
            for(let i=0;i<9;i++){if(board[i]===''){board[i]=pSym;if(win(pSym)){board[i]='';return i}board[i]=''}}
            for(let i=0;i<9;i++){if(board[i]===''){board[i]=oSym;if(win(oSym)){board[i]='';return i}board[i]=''}}
            if(board[4]==='')return 4;
            for(let c of[0,2,6,8])if(board[c]==='')return c;
            for(let i=0;i<9;i++)if(board[i]==='')return i;
            return null;
        }
        
        function win(s){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return p.some(w=>w.every(i=>board[i]===s))}
        function hw(s){const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];for(let w of p){if(w.every(i=>board[i]===s)){document.querySelectorAll('.cell').forEach((c,i)=>{if(w.includes(i))c.classList.add('win-cell')});break}}}
        function full(){return board.every(c=>c!=='')}
        function hintCell(i){clearH();document.querySelectorAll('.cell')[i].classList.add('hint')}
        function clearH(){document.querySelectorAll('.cell').forEach(c=>c.classList.remove('hint','win-cell'))}
        function updateB(){document.querySelectorAll('.cell').forEach((c,i)=>{c.textContent=board[i];c.className='cell';if(board[i]==='X')c.classList.add('X');if(board[i]==='O')c.classList.add('O')})}
        function setS(m){document.getElementById('status').textContent=m}
        
        function chSym(s){if(mode!=='calc'||active)return;pSym=s;oSym=s==='X'?'O':'X';document.getElementById('bX').className=s==='X'?'btn sel-x':'btn';document.getElementById('bO').className=s==='O'?'btn sel-o':'btn';if(first)startCalc()}
        function chFirst(w){if(mode!=='calc'||active)return;first=w;document.getElementById('bMe').className=w==='me'?'btn sel-first':'btn';document.getElementById('bOp').className=w==='opp'?'btn sel-first':'btn';if(pSym)startCalc()}
        function startCalc(){active=true;board=['','','','','','','','',''];waiting=false;updateB();clearH();if(first==='opp'){setS('Ход соперника');waiting=true}else{setS('Просчитываю...');setTimeout(()=>makeHint(),500)}}
        
        function resetGame(){
            board=['','','','','','','','',''];updateB();clearH();
            if(mode==='online'){
                active=true;waiting=_pid==='O';
                upTurn(waiting?'O':_pid);
                setS(waiting?'Ход соперника':'Ваш ход');
                broadcast({action:'reset'});
                if(!waiting) broadcast({action:'move',board:board,turn:_pid==='X'?'O':'X'});
            }else if(mode==='ai'){active=true;pSym='X';oSym='O';setS('Ваш ход')}
            else if(mode==='friend'){active=true;upTurn('X');setS('Ходит ✕')}
            else{active=false;waiting=false;if(pSym&&first)startCalc();else setS('Выберите настройки')}
        }
        
        // Online
        function initOnline(){
            if(!window.supabase){document.getElementById('roomBox').innerHTML='<div class="room-box">Загрузка...</div>';loadSB();return}
            setupOL();
        }
        function loadSB(){
            const s=document.createElement('script');
            s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            s.onload=()=>{window.supabase=supabase.createClient('https://mvnmqtvdazrrcrufaely.supabase.co','sb_publishable_oVIxgyYQvjTUkXJ4QQ24CQ_30pbjVm7');setupOL()};
            document.head.appendChild(s);
        }
        function setupOL(){
            const p=new URLSearchParams(window.location.search),j=p.get('room');
            if(j){_rid=j;_pid='O';joinRoom();}
            else{_rid=Math.random().toString(36).substr(2,6);_pid='X';createRoom();}
        }
        async function createRoom(){
            const l=window.location.origin+window.location.pathname+'?room='+_rid;
            document.getElementById('roomBox').innerHTML=`<div class="room-box">Отправьте ссылку сопернику<br><div class="code">${_rid}</div><input value="${l}" readonly onclick="this.select()"><button class="btn-copy" onclick="copyLink()">Копировать ссылку</button></div>`;
            try{await window.supabase.from('games').upsert({id:_rid,board:'["","","","","","","","",""]',turn:'X',chat:'[]',status:'waiting'})}catch(e){}
            subRoom();active=true;upTurn('X');setS('Ожидание соперника...');
        }
        async function joinRoom(){
            try{
                const {data}=await window.supabase.from('games').select('*').eq('id',_rid).single();
                if(data){
                    await window.supabase.from('games').update({status:'playing'}).eq('id',_rid);
                    document.getElementById('roomBox').innerHTML='<div class="room-box">Соперник подключен!</div>';
                    setTimeout(()=>{document.getElementById('roomBox').classList.add('hidden');document.getElementById('turnBar').classList.remove('hidden')},1500);
                    subRoom();active=true;waiting=true;upTurn('X');setS('Ход соперника (✕)');
                    // Уведомляем хоста
                    broadcast({action:'joined'});
                }else document.getElementById('roomBox').innerHTML='<div class="room-box">Комната не найдена</div>';
            }catch(e){document.getElementById('roomBox').innerHTML='<div class="room-box">Ошибка</div>';}
        }
        function subRoom(){
            if(_oc) window.supabase.removeChannel(_oc);
            _oc=window.supabase.channel('room_'+_rid)
            .on('broadcast',{event:'move'},(p)=>{
                const d=p.payload;
                if(d.action==='joined'){
                    // Хост узнаёт что кто-то подключился
                    document.getElementById('roomBox').innerHTML='<div class="room-box">Соперник подключен!</div>';
                    setTimeout(()=>{document.getElementById('roomBox').classList.add('hidden');document.getElementById('turnBar').classList.remove('hidden')},1500);
                    return;
                }
                if(d.action==='reset'){
                    board=['','','','','','','','',''];updateB();clearH();
                    active=true;waiting=_pid==='O';
                    upTurn(waiting?'O':_pid);
                    setS(waiting?'Ход соперника':'Ваш ход');
                    return;
                }
                board=d.board;updateB();clearH();
                if(d.winner){hw(d.winner);setS(d.winner===_pid?'Вы победили!':'Соперник победил');active=false}
                else if(full()){setS('Ничья');active=false}
                else{waiting=d.turn!==_pid;upTurn(d.turn);setS(waiting?'Ход соперника':'Ваш ход')}
            })
            .on('broadcast',{event:'chat'},(p)=>{
                const m=p.payload,c=document.getElementById('chatMsgs'),cl=m.player===_pid?'chat-msg me':'chat-msg they';
                c.innerHTML+=`<div class="${cl}"><b>${m.player===_pid?'Вы':'Соперник'}:</b> ${m.text}</div>`;c.scrollTop=c.scrollHeight;
            })
            .subscribe();
        }
        function copyLink(){const i=document.querySelector('.room-box input');if(i){i.select();navigator.clipboard.writeText(i.value);setS('Ссылка скопирована!')}}
        async function sendChat(){const i=document.getElementById('chatIn'),t=i.value.trim();if(!t||!_oc)return;await _oc.send({type:'broadcast',event:'chat',payload:{player:_pid,text:t}});const c=document.getElementById('chatMsgs');c.innerHTML+=`<div class="chat-msg me"><b>Вы:</b> ${t}</div>`;c.scrollTop=c.scrollHeight;i.value=''}
        async function broadcast(d){if(!_oc)return;await _oc.send({type:'broadcast',event:'move',payload:d})}
        function onlineClick(i){
            board[i]=_pid;updateB();
            if(win(_pid)){hw(_pid);setS('Вы победили!');active=false;broadcast({action:'move',board:board,turn:_pid,winner:_pid});return}
            if(full()){setS('Ничья');active=false;broadcast({action:'move',board:board,turn:_pid,winner:null});return}
            waiting=true;upTurn(_pid==='X'?'O':'X');setS('Ход соперника');
            broadcast({action:'move',board:board,turn:_pid==='X'?'O':'X',winner:null});
        }
        
        updateB();setS('Выберите режим');
    </script>
</body>
</html>
