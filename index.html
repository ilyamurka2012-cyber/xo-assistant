<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XO Assistant Pro - by Sonki</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg: #0a0a0a;
            --bg2: rgba(10, 10, 20, 0.7);
            --text: rgba(255, 255, 255, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --cell-bg: rgba(20, 20, 30, 0.8);
            --settings-bg: rgba(255, 255, 255, 0.05);
            --status-bg: rgba(255, 255, 255, 0.05);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(255, 255, 255, 0.2);
            --btn-text: rgba(255, 255, 255, 0.7);
            --shadow: 0 0 50px rgba(255, 0, 110, 0.3), 0 0 100px rgba(58, 134, 255, 0.2);
        }

        .light-theme {
            --bg: #f0f2f5;
            --bg2: rgba(255, 255, 255, 0.8);
            --text: #1a1a1a;
            --border: rgba(0, 0, 0, 0.1);
            --cell-bg: #ffffff;
            --settings-bg: rgba(255, 255, 255, 0.8);
            --status-bg: rgba(255, 255, 255, 0.8);
            --btn-bg: #ffffff;
            --btn-border: rgba(0, 0, 0, 0.2);
            --btn-text: #333;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s;
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, #ff006e 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, #3a86ff 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, #8338ec 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #ffbe0b 0%, transparent 50%),
                radial-gradient(ellipse at 20% 20%, #fb5607 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            opacity: 0.6;
            transition: opacity 0.5s;
        }

        .light-theme .bg-animation {
            opacity: 0.15;
        }

        @keyframes bgShift {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.5) rotate(5deg); }
            100% { transform: scale(1.2) rotate(-5deg); }
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg2);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            backdrop-filter: blur(20px);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow);
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--bg2);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow);
            transition: all 0.5s;
            margin: 20px;
        }

        .mode-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
            background: var(--settings-bg);
            border-radius: 15px;
            padding: 5px;
        }

        .mode-tab {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: var(--btn-text);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, #ff006e, #3a86ff);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 0, 110, 0.3);
        }

        .mode-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mode-tab.active:hover {
            background: linear-gradient(135deg, #ff006e, #3a86ff);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.2em;
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #3a86ff, #8338ec, #ffbe0b);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
            letter-spacing: 5px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            text-align: center;
            color: var(--btn-text);
            font-size: 0.7em;
            margin-top: -15px;
            margin-bottom: 25px;
            letter-spacing: 3px;
        }

        .settings-block {
            background: var(--settings-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .settings-block:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .settings-label {
            color: var(--text);
            font-size: 0.8em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .button-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 14px 10px;
            border: 2px solid var(--btn-border);
            border-radius: 15px;
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8em;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .btn:hover {
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .btn.active-x {
            background: linear-gradient(135deg, #ff006e, #ff4d6d);
            border-color: #ff006e;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.4);
        }

        .btn.active-o {
            background: linear-gradient(135deg, #3a86ff, #4d9fff);
            border-color: #3a86ff;
            color: white;
            box-shadow: 0 0 20px rgba(58, 134, 255, 0.4);
        }

        .btn.active-first {
            background: linear-gradient(135deg, #8338ec, #9d5cff);
            border-color: #8338ec;
            color: white;
            box-shadow: 0 0 20px rgba(131, 56, 236, 0.4);
        }

        .win-probability {
            background: var(--settings-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 12px 15px;
            margin: 15px 0;
            text-align: center;
        }

        .prob-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .prob-fill {
            height: 100%;
            background: linear-gradient(90deg, #44cc44, #ffbe0b, #ff4444);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .prob-text {
            color: var(--text);
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 20px 0;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid var(--border);
            position: relative;
        }

        .board::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 22px;
            background: linear-gradient(45deg, #ff006e, #3a86ff, #8338ec, #ffbe0b);
            z-index: -1;
            animation: borderRotate 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border: 2px solid var(--border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.x {
            color: #ff006e;
            text-shadow: 0 0 20px rgba(255, 0, 110, 0.8), 0 0 40px rgba(255, 0, 110, 0.4);
            animation: popX 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cell.o {
            color: #3a86ff;
            text-shadow: 0 0 20px rgba(58, 134, 255, 0.8), 0 0 40px rgba(58, 134, 255, 0.4);
            animation: popO 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes popX {
            0% { transform: scale(1.3) rotate(90deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes popO {
            0% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.suggestion {
            animation: suggestGlow 1s ease-in-out infinite;
            border-color: #ffbe0b !important;
            background: rgba(255, 190, 11, 0.15) !important;
        }

        @keyframes suggestGlow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 190, 11, 0.5);
                border-color: rgba(255, 190, 11, 0.5);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 190, 11, 0.8);
                border-color: rgba(255, 190, 11, 1);
            }
        }

        .cell.win {
            animation: winCelebrate 0.5s ease-in-out infinite alternate;
        }

        @keyframes winCelebrate {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 255, 255, 0.5); }
            100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 255, 255, 0.8); }
        }

        .status {
            text-align: center;
            padding: 15px;
            margin: 15px 0;
            background: var(--status-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: var(--text);
            font-size: 0.8em;
            font-weight: 500;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-section {
            background: var(--settings-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }

        .chat-messages {
            height: 120px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .chat-message {
            color: var(--text);
            font-size: 0.7em;
            margin-bottom: 5px;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            word-break: break-word;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7em;
            outline: none;
        }

        .chat-send {
            padding: 10px 15px;
            background: linear-gradient(135deg, #ff006e, #3a86ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7em;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            background: var(--btn-bg);
            border: 2px solid var(--btn-border);
            border-radius: 15px;
            color: var(--btn-text);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8em;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            border-color: #ff006e;
            color: #ff006e;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            color: var(--btn-text);
            font-size: 0.6em;
            letter-spacing: 3px;
            opacity: 0.5;
        }

        .room-info {
            text-align: center;
            color: var(--text);
            font-size: 0.7em;
            margin: 10px 0;
            padding: 10px;
            background: var(--settings-bg);
            border-radius: 10px;
            word-break: break-all;
        }

        .copy-btn {
            padding: 5px 10px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--btn-text);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6em;
            margin-left: 5px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 20px;
            }
            
            .title {
                font-size: 1.8em;
            }
            
            .cell {
                font-size: 2em;
            }
            
            .btn {
                font-size: 0.7em;
                padding: 12px 8px;
            }
            
            .mode-tab {
                font-size: 0.65em;
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div class="bg-animation"></div>
    <div class="confetti-container" id="confetti"></div>

    <div class="container">
        <div class="title">XO PRO</div>
        <div class="subtitle">ASSISTANT</div>

        <div class="mode-tabs">
            <button class="mode-tab active" id="tabFriend" onclick="switchMode('friend')">🤝 С другом</button>
            <button class="mode-tab" id="tabAI" onclick="switchMode('ai')">🤖 Против ИИ</button>
            <button class="mode-tab" id="tabOnline" onclick="switchMode('online')">🌐 Онлайн</button>
        </div>

        <div id="settingsSection">
            <div class="settings-block">
                <div class="settings-label">🎮 Вы играете за</div>
                <div class="button-row">
                    <button class="btn" id="btnX" onclick="chooseSymbol('X')">✕ Крестик</button>
                    <button class="btn" id="btnO" onclick="chooseSymbol('O')">○ Нолик</button>
                </div>
            </div>

            <div class="settings-block" id="firstMoveBlock">
                <div class="settings-label">👑 Первый ход</div>
                <div class="button-row">
                    <button class="btn" id="btnMe" onclick="chooseFirst('me')">Я</button>
                    <button class="btn" id="btnOpp" onclick="chooseFirst('opp')">Соперник</button>
                </div>
            </div>
        </div>

        <div class="win-probability" id="probSection" style="display:none;">
            <div class="prob-text" id="probText">Вероятность победы: 50%</div>
            <div class="prob-bar">
                <div class="prob-fill" id="probFill" style="width: 50%;"></div>
            </div>
        </div>

        <div class="board" id="board">
            <div class="cell" onclick="cellClick(0)"></div>
            <div class="cell" onclick="cellClick(1)"></div>
            <div class="cell" onclick="cellClick(2)"></div>
            <div class="cell" onclick="cellClick(3)"></div>
            <div class="cell" onclick="cellClick(4)"></div>
            <div class="cell" onclick="cellClick(5)"></div>
            <div class="cell" onclick="cellClick(6)"></div>
            <div class="cell" onclick="cellClick(7)"></div>
            <div class="cell" onclick="cellClick(8)"></div>
        </div>

        <div class="status" id="status">Выберите режим и настройки</div>

        <div class="room-info" id="roomInfo" style="display:none;"></div>

        <div class="chat-section" id="chatSection" style="display:none;">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-row">
                <input class="chat-input" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="chat-send" onclick="sendMessage()">→</button>
            </div>
        </div>

        <button class="reset-btn" onclick="resetGame()">🔄 Новая игра</button>
        
        <div class="footer">made by sonki</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
