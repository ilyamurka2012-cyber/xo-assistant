<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XO Assistant - by Sonki</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg: #0a0a0a;
            --bg2: rgba(10, 10, 20, 0.7);
            --text: rgba(255, 255, 255, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --cell-bg: rgba(20, 20, 30, 0.8);
            --settings-bg: rgba(255, 255, 255, 0.05);
            --status-bg: rgba(255, 255, 255, 0.05);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(255, 255, 255, 0.2);
            --btn-text: rgba(255, 255, 255, 0.7);
        }

        .light-theme {
            --bg: #f0f2f5;
            --bg2: rgba(255, 255, 255, 0.8);
            --text: #1a1a1a;
            --border: rgba(0, 0, 0, 0.1);
            --cell-bg: #ffffff;
            --settings-bg: rgba(255, 255, 255, 0.8);
            --status-bg: rgba(255, 255, 255, 0.8);
            --btn-bg: #ffffff;
            --btn-border: rgba(0, 0, 0, 0.2);
            --btn-text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s;
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, #ff006e 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, #3a86ff 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, #8338ec 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #ffbe0b 0%, transparent 50%),
                radial-gradient(ellipse at 20% 20%, #fb5607 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            opacity: 0.6;
        }

        .light-theme .bg-animation { opacity: 0.15; }

        @keyframes bgShift {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.5) rotate(5deg); }
            100% { transform: scale(1.2) rotate(-5deg); }
        }

        .confetti-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .confetti {
            position: absolute;
            width: 12px; height: 12px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 200;
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--bg2); border: 1px solid var(--border);
            cursor: pointer; font-size: 1.3em;
            display: flex; align-items: center; justify-content: center;
            color: var(--text); backdrop-filter: blur(20px);
        }

        .container {
            position: relative; z-index: 10;
            background: var(--bg2); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 25px;
            padding: 20px; width: 95%; max-width: 500px;
            box-shadow: 0 0 50px rgba(255,0,110,0.3);
            margin: 20px auto;
        }

        .mode-tabs {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 3px; margin-bottom: 15px;
            background: var(--settings-bg); border-radius: 12px; padding: 3px;
        }

        .mode-tab {
            padding: 10px 4px; border: none; border-radius: 10px;
            background: transparent; color: var(--btn-text);
            cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 0.55em; font-weight: 700;
            transition: all 0.3s; text-transform: uppercase;
            text-align: center; line-height: 1.2;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, #ff006e, #3a86ff);
            color: white;
        }

        .title {
            text-align: center; margin-bottom: 10px;
            font-size: 1.8em; font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #3a86ff, #8338ec, #ffbe0b);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: gradientShift 5s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            text-align: center; color: var(--btn-text);
            font-size: 0.6em; margin-top: -8px; margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .settings-block {
            background: var(--settings-bg); border: 1px solid var(--border);
            border-radius: 18px; padding: 15px; margin-bottom: 10px;
        }

        .settings-label {
            color: var(--text); font-size: 0.75em; font-weight: 700;
            margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase;
        }

        .button-row { display: flex; gap: 8px; }

        .btn {
            flex: 1; padding: 12px 8px;
            border: 2px solid var(--btn-border); border-radius: 12px;
            background: var(--btn-bg); color: var(--btn-text);
            cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 0.75em; font-weight: 700; letter-spacing: 1px;
            transition: all 0.3s; text-transform: uppercase;
        }

        .btn.active-x {
            background: linear-gradient(135deg, #ff006e, #ff4d6d);
            border-color: #ff006e; color: white;
        }

        .btn.active-o {
            background: linear-gradient(135deg, #3a86ff, #4d9fff);
            border-color: #3a86ff; color: white;
        }

        .btn.active-first {
            background: linear-gradient(135deg, #8338ec, #9d5cff);
            border-color: #8338ec; color: white;
        }

        .board {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin: 15px 0; padding: 10px;
            background: rgba(255,255,255,0.03); border-radius: 18px;
            border: 1px solid var(--border); position: relative;
        }

        .board::before {
            content: ''; position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff006e, #3a86ff, #8338ec, #ffbe0b);
            z-index: -1; animation: borderRotate 4s linear infinite; opacity: 0.5;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .cell {
            aspect-ratio: 1; background: var(--cell-bg);
            border: 2px solid var(--border); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2em; font-weight: 900; cursor: pointer;
            transition: all 0.2s; position: relative;
        }

        .cell:active { transform: scale(0.95); }

        .cell.x {
            color: #ff006e; text-shadow: 0 0 20px rgba(255,0,110,0.8);
            animation: popIn 0.3s ease;
        }

        .cell.o {
            color: #3a86ff; text-shadow: 0 0 20px rgba(58,134,255,0.8);
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.suggestion {
            animation: suggestGlow 1s ease-in-out infinite;
            border-color: #ffbe0b !important;
            background: rgba(255,190,11,0.2) !important;
        }

        @keyframes suggestGlow {
            0%,100% { box-shadow: 0 0 20px rgba(255,190,11,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,190,11,0.8); }
        }

        .cell.win {
            animation: winCelebrate 0.4s ease-in-out infinite alternate;
        }

        @keyframes winCelebrate {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); box-shadow: 0 0 40px rgba(255,255,255,0.6); }
        }

        .status {
            text-align: center; padding: 12px; margin: 12px 0;
            background: var(--status-bg); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 0.75em;
            font-weight: 500; min-height: 40px;
            display: flex; align-items: center; justify-content: center;
        }

        .room-info {
            text-align: center; color: var(--text); font-size: 0.65em;
            margin: 8px 0; padding: 10px; background: var(--settings-bg);
            border-radius: 10px;
        }

        .copy-btn {
            display: inline-block; padding: 6px 12px;
            background: var(--btn-bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--btn-text); cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-size: 0.65em;
            margin: 5px; transition: all 0.3s;
        }

        .join-input {
            width: 100%; padding: 8px; margin: 5px 0;
            background: var(--btn-bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-family: 'Orbitron', sans-serif; font-size: 0.6em;
            text-align: center; outline: none;
        }

        .chat-section {
            background: var(--settings-bg); border: 1px solid var(--border);
            border-radius: 15px; padding: 12px; margin-top: 12px;
        }

        .chat-messages {
            height: 100px; overflow-y: auto; margin-bottom: 8px;
            padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px;
        }

        .chat-message {
            color: var(--text); font-size: 0.65em; margin-bottom: 4px;
            padding: 4px 8px; background: rgba(255,255,255,0.05);
            border-radius: 8px; word-break: break-word;
        }

        .chat-input-row { display: flex; gap: 6px; }

        .chat-input {
            flex: 1; padding: 8px; background: var(--btn-bg);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-family: 'Orbitron', sans-serif;
            font-size: 0.65em; outline: none;
        }

        .chat-send {
            padding: 8px 12px; background: linear-gradient(135deg, #ff006e, #3a86ff);
            border: none; border-radius: 8px; color: white;
            font-family: 'Orbitron', sans-serif; font-size: 0.7em;
            font-weight: 700; cursor: pointer;
        }

        .reset-btn {
            width: 100%; padding: 14px; background: var(--btn-bg);
            border: 2px solid var(--btn-border); border-radius: 12px;
            color: var(--btn-text); font-family: 'Orbitron', sans-serif;
            font-size: 0.75em; font-weight: 700; cursor: pointer;
            letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.3s; margin-top: 10px;
        }

        .reset-btn:hover { border-color: #ff006e; color: #ff006e; }

        .footer {
            text-align: center; margin-top: 12px;
            color: var(--btn-text); font-size: 0.6em;
            letter-spacing: 3px; opacity: 0.5;
        }

        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .container { padding: 15px; }
            .title { font-size: 1.6em; }
            .cell { font-size: 1.8em; }
            .btn { font-size: 0.65em; padding: 10px 6px; }
            .mode-tab { font-size: 0.5em; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div class="bg-animation"></div>
    <div class="confetti-container" id="confetti"></div>

    <div class="container">
        <div class="title">XO</div>
        <div class="subtitle">ASSISTANT</div>

        <div class="mode-tabs">
            <button class="mode-tab active" id="tabCalc" onclick="switchMode('calc')">🧮 Ассистент</button>
            <button class="mode-tab" id="tabAI" onclick="switchMode('ai')">🤖 ИИ</button>
            <button class="mode-tab" id="tabFriend" onclick="switchMode('friend')">👥 Передача</button>
            <button class="mode-tab" id="tabOnline" onclick="switchMode('online')">🌐 Онлайн</button>
        </div>

        <div id="settingsSection">
            <div class="settings-block" id="symbolBlock">
                <div class="settings-label">🎮 Вы играете за</div>
                <div class="button-row">
                    <button class="btn" id="btnX" onclick="chooseSymbol('X')">✕ Крестик</button>
                    <button class="btn" id="btnO" onclick="chooseSymbol('O')">○ Нолик</button>
                </div>
            </div>

            <div class="settings-block" id="firstMoveBlock">
                <div class="settings-label">👑 Первый ход</div>
                <div class="button-row">
                    <button class="btn" id="btnMe" onclick="chooseFirst('me')">Я</button>
                    <button class="btn" id="btnOpp" onclick="chooseFirst('opp')">Соперник</button>
                </div>
            </div>
        </div>

        <div class="room-info hidden" id="roomInfo"></div>

        <div class="board" id="board">
            <div class="cell" onclick="cellClick(0)"></div>
            <div class="cell" onclick="cellClick(1)"></div>
            <div class="cell" onclick="cellClick(2)"></div>
            <div class="cell" onclick="cellClick(3)"></div>
            <div class="cell" onclick="cellClick(4)"></div>
            <div class="cell" onclick="cellClick(5)"></div>
            <div class="cell" onclick="cellClick(6)"></div>
            <div class="cell" onclick="cellClick(7)"></div>
            <div class="cell" onclick="cellClick(8)"></div>
        </div>

        <div class="chat-section hidden" id="chatSection">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-row">
                <input class="chat-input" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button class="chat-send" onclick="sendMessage()">→</button>
            </div>
        </div>

        <div class="status" id="status">Выберите режим</div>

        <button class="reset-btn" onclick="resetGame()">🔄 Новая игра</button>
        
        <div class="footer">made by sonki</div>
    </div>

    <script>
        // Supabase конфиг
        const SUPABASE_URL = 'https://mvnmqtvdazrrcrufaely.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_oVIxgyYQvjTUkXJ4QQ24CQ_30pbjVm7';
        
        let supabase = null;
        let onlineChannel = null;
        let onlineRoomId = null;
        let onlinePlayerSymbol = null;

        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.log('Supabase offline');
        }

        // Конфетти
        function spawnConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#ff006e','#3a86ff','#8338ec','#ffbe0b','#fb5607','#00f5d4'];
            for(let i=0;i<60;i++){
                setTimeout(()=>{
                    const c=document.createElement('div');
                    c.className='confetti';
                    c.style.left=Math.random()*100+'%';
                    c.style.background=colors[Math.floor(Math.random()*colors.length)];
                    c.style.width=(Math.random()*10+5)+'px';
                    c.style.height=(Math.random()*10+5)+'px';
                    c.style.animationDuration=(Math.random()*2+2)+'s';
                    container.appendChild(c);
                    setTimeout(()=>c.remove(),3000);
                },i*15);
            }
        }

        // Тема
        let isDark=true;
        function toggleTheme(){
            isDark=!isDark;
            document.body.className=isDark?'':'light-theme';
            document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';
            localStorage.setItem('theme',isDark?'dark':'light');
        }
        if(localStorage.getItem('theme')==='light'){
            isDark=false;
            document.body.className='light-theme';
            document.getElementById('themeBtn').textContent='☀️';
        }

        // Игра
        let playerSymbol=null,opponentSymbol=null,firstMove=null;
        let board=['','','','','','','','',''];
        let gameActive=false,waitingForOpponent=false;
        let currentMode='calc';

        function switchMode(mode){
            // Отключаем предыдущий онлайн канал
            if(onlineChannel){
                supabase.removeChannel(onlineChannel);
                onlineChannel=null;
            }
            
            currentMode=mode;
            ['tabCalc','tabAI','tabFriend','tabOnline'].forEach((id,i)=>{
                const modes=['calc','ai','friend','online'];
                document.getElementById(id).className=modes[i]===mode?'mode-tab active':'mode-tab';
            });
            
            const symbolBlock=document.getElementById('symbolBlock');
            const firstMoveBlock=document.getElementById('firstMoveBlock');
            const roomInfo=document.getElementById('roomInfo');
            const chatSection=document.getElementById('chatSection');
            
            board=['','','','','','','','',''];
            gameActive=false;
            waitingForOpponent=false;
            updateBoard();
            clearHighlights();
            
            if(mode==='ai'){
                symbolBlock.classList.add('hidden');
                firstMoveBlock.classList.add('hidden');
                roomInfo.classList.add('hidden');
                chatSection.classList.add('hidden');
                playerSymbol='X';
                opponentSymbol='O';
                gameActive=true;
                setStatus('🤖 Ваш ход! Вы ✕');
            }else if(mode==='friend'){
                symbolBlock.classList.add('hidden');
                firstMoveBlock.classList.add('hidden');
                roomInfo.classList.add('hidden');
                chatSection.classList.add('hidden');
                playerSymbol='X';
                opponentSymbol='O';
                gameActive=true;
                setStatus('👥 Ходит ✕');
            }else if(mode==='online'){
                symbolBlock.classList.add('hidden');
                firstMoveBlock.classList.add('hidden');
                roomInfo.classList.remove('hidden');
                chatSection.classList.remove('hidden');
                initOnlineMode();
            }else{
                symbolBlock.classList.remove('hidden');
                firstMoveBlock.classList.remove('hidden');
                roomInfo.classList.add('hidden');
                chatSection.classList.add('hidden');
                playerSymbol=null;
                opponentSymbol=null;
                firstMove=null;
                document.getElementById('btnX').className='btn';
                document.getElementById('btnO').className='btn';
                document.getElementById('btnMe').className='btn';
                document.getElementById('btnOpp').className='btn';
                setStatus('Выберите символ и кто первый');
            }
        }

        // Онлайн режим через Supabase
        function initOnlineMode(){
            if(!supabase){
                document.getElementById('roomInfo').innerHTML='❌ Онлайн временно недоступен';
                setStatus('❌ Сервер не подключён');
                return;
            }
            
            const params=new URLSearchParams(window.location.search);
            const joinRoom=params.get('room');
            
            if(joinRoom){
                // Присоединяемся
                onlineRoomId=joinRoom;
                onlinePlayerSymbol='O';
                joinOnlineRoom();
            }else{
                // Создаём комнату
                onlineRoomId=Math.random().toString(36).substr(2,6);
                onlinePlayerSymbol='X';
                createOnlineRoom();
            }
        }

        async function createOnlineRoom(){
            const link=window.location.origin+window.location.pathname+'?room='+onlineRoomId;
            document.getElementById('roomInfo').innerHTML=`
                Код комнаты: <b>${onlineRoomId}</b><br>
                <input class="join-input" value="${link}" readonly onclick="this.select()">
                <button class="copy-btn" onclick="copyLink()">📋 Копировать</button>
                <br><small>Отправьте ссылку другу</small>
            `;
            
            // Сохраняем начальное состояние
            await supabase
                .from('games')
                .upsert({
                    id: onlineRoomId,
                    board: ['','','','','','','','',''],
                    turn: 'X',
                    chat: [],
                    status: 'waiting'
                });
            
            // Подписываемся на изменения
            subscribeToRoom();
            
            gameActive=true;
            setStatus('🌐 Ожидание соперника...');
            document.getElementById('roomInfo').innerHTML+=`<br><small>Ожидаем игрока O...</small>`;
        }

        async function joinOnlineRoom(){
            document.getElementById('roomInfo').innerHTML=`
                Подключение к комнате <b>${onlineRoomId}</b>...
            `;
            
            const {data}=await supabase
                .from('games')
                .select('*')
                .eq('id',onlineRoomId)
                .single();
            
            if(data){
                await supabase
                    .from('games')
                    .update({status:'playing',turn:'X'})
                    .eq('id',onlineRoomId);
                
                document.getElementById('roomInfo').innerHTML=`
                    Комната: <b>${onlineRoomId}</b> | Вы: <b>O</b>
                `;
                
                subscribeToRoom();
                gameActive=true;
                waitingForOpponent=true;
                setStatus('🎯 Ход соперника (X)');
            }else{
                document.getElementById('roomInfo').innerHTML='❌ Комната не найдена';
            }
        }

        function subscribeToRoom(){
            onlineChannel=supabase
                .channel('room_'+onlineRoomId)
                .on('broadcast',{event:'move'},(payload)=>{
                    const data=payload.payload;
                    board=data.board;
                    updateBoard();
                    clearHighlights();
                    
                    if(data.winner){
                        highlightWinCells(data.winner);
                        setStatus(data.winner===onlinePlayerSymbol?'🎉 Вы выиграли!':'😞 Соперник выиграл');
                        spawnConfetti();
                        gameActive=false;
                    }else if(isBoardFull()){
                        setStatus('🤝 Ничья!');
                        gameActive=false;
                    }else{
                        waitingForOpponent=data.turn!==onlinePlayerSymbol;
                        setStatus(waitingForOpponent?'🎯 Ход соперника':'🤔 Ваш ход');
                    }
                })
                .on('broadcast',{event:'chat'},(payload)=>{
                    const msg=payload.payload;
                    const container=document.getElementById('chatMessages');
                    container.innerHTML+=`<div class="chat-message"><b>${msg.player}:</b> ${msg.text}</div>`;
                    container.scrollTop=container.scrollHeight;
                })
                .subscribe();
        }

        function copyLink(){
            const input=document.querySelector('.join-input');
            if(input){
                input.select();
                navigator.clipboard.writeText(input.value);
                setStatus('✅ Ссылка скопирована!');
            }
        }

        async function sendMessage(){
            const input=document.getElementById('chatInput');
            const text=input.value.trim();
            if(!text||!onlineChannel) return;
            
            await onlineChannel.send({
                type:'broadcast',
                event:'chat',
                payload:{player:onlinePlayerSymbol,text:text}
            });
            
            const container=document.getElementById('chatMessages');
            container.innerHTML+=`<div class="chat-message"><b>Вы:</b> ${text}</div>`;
            container.scrollTop=container.scrollHeight;
            input.value='';
        }

        async function broadcastMove(winner){
            if(!onlineChannel) return;
            await onlineChannel.send({
                type:'broadcast',
                event:'move',
                payload:{
                    board:board,
                    turn:onlinePlayerSymbol==='X'?'O':'X',
                    winner:winner||null
                }
            });
        }

        function chooseSymbol(symbol){
            if(currentMode!=='calc') return;
            if(gameActive) return;
            playerSymbol=symbol;
            opponentSymbol=symbol==='X'?'O':'X';
            document.getElementById('btnX').className=symbol==='X'?'btn active-x':'btn';
            document.getElementById('btnO').className=symbol==='O'?'btn active-o':'btn';
            if(firstMove) startCalcGame();
        }

        function chooseFirst(who){
            if(currentMode!=='calc') return;
            if(gameActive) return;
            firstMove=who;
            document.getElementById('btnMe').className=who==='me'?'btn active-first':'btn';
            document.getElementById('btnOpp').className=who==='opp'?'btn active-first':'btn';
            if(playerSymbol) startCalcGame();
        }

        function startCalcGame(){
            gameActive=true;
            board=['','','','','','','','',''];
            waitingForOpponent=false;
            updateBoard();
            clearHighlights();
            
            if(firstMove==='opp'){
                setStatus('🎯 Нажмите клетку соперника');
                waitingForOpponent=true;
            }else{
                setStatus('🤔 Анализирую...');
                setTimeout(()=>makePlayerMove(),500);
            }
        }

        function cellClick(index){
            if(!gameActive) return;
            if(board[index]!==''){setStatus('⚠️ Клетка занята!');return;}

            // Онлайн
            if(currentMode==='online'){
                if(waitingForOpponent) return;
                board[index]=onlinePlayerSymbol;
                updateBoard();
                
                if(checkWinner(onlinePlayerSymbol)){
                    highlightWinCells(onlinePlayerSymbol);
                    setStatus('🎉 Вы выиграли!');
                    spawnConfetti();
                    gameActive=false;
                    broadcastMove(onlinePlayerSymbol);
                    return;
                }
                if(isBoardFull()){setStatus('🤝 Ничья!');gameActive=false;broadcastMove(null);return;}
                
                waitingForOpponent=true;
                setStatus('🎯 Ход соперника');
                broadcastMove(null);
                return;
            }

            // ИИ
            if(currentMode==='ai'){
                board[index]=playerSymbol;
                updateBoard();
                if(checkWinner(playerSymbol)){highlightWinCells(playerSymbol);setStatus('🎉 Вы выиграли!');spawnConfetti();gameActive=false;return;}
                if(isBoardFull()){setStatus('🤝 Ничья!');gameActive=false;return;}
                
                setStatus('🤖 ИИ думает...');
                setTimeout(()=>{
                    const move=getAIMove();
                    if(move!==null){
                        board[move]=opponentSymbol;
                        updateBoard();
                        if(checkWinner(opponentSymbol)){highlightWinCells(opponentSymbol);setStatus('😞 ИИ выиграл');gameActive=false;}
                        else if(isBoardFull()){setStatus('🤝 Ничья!');gameActive=false;}
                        else{setStatus('🤖 Ваш ход');}
                    }
                },400);
                return;
            }

            // Передача
            if(currentMode==='friend'){
                const moves=board.filter(c=>c!=='').length;
                const cs=moves%2===0?'X':'O';
                board[index]=cs;
                updateBoard();
                if(checkWinner(cs)){highlightWinCells(cs);setStatus('🎉 '+cs+' выиграл!');spawnConfetti();gameActive=false;return;}
                if(isBoardFull()){setStatus('🤝 Ничья!');gameActive=false;return;}
                setStatus('👥 Ходит '+(moves%2===0?'○':'✕'));
                return;
            }

            // Ассистент
            if(currentMode==='calc'&&waitingForOpponent){
                board[index]=opponentSymbol;
                updateBoard();
                waitingForOpponent=false;
                clearHighlights();
                if(checkWinner(opponentSymbol)){highlightWinCells(opponentSymbol);setStatus('😞 Соперник выиграл');gameActive=false;return;}
                if(isBoardFull()){setStatus('🤝 Ничья!');gameActive=false;return;}
                setStatus('🧠 Просчитываю...');
                setTimeout(()=>makePlayerMove(),400);
            }
        }

        function makePlayerMove(){
            if(!gameActive) return;
            const move=getBestMove();
            if(move!==null){
                highlightCell(move);
                setStatus('💡 Ходите на подсвеченную клетку');
                setTimeout(()=>{
                    board[move]=playerSymbol;
                    updateBoard();
                    clearHighlights();
                    if(checkWinner(playerSymbol)){highlightWinCells(playerSymbol);setStatus('🎉 Вы выиграли!');spawnConfetti();gameActive=false;return;}
                    if(isBoardFull()){setStatus('🤝 Ничья!');gameActive=false;return;}
                    setStatus('🎯 Нажмите клетку соперника');
                    waitingForOpponent=true;
                },800);
            }
        }

        function getAIMove(){
            if(Math.random()<0.25){
                const empty=[];
                for(let i=0;i<9;i++) if(board[i]==='') empty.push(i);
                if(empty.length) return empty[Math.floor(Math.random()*empty.length)];
            }
            return getBestMove();
        }

        function getBestMove(){
            for(let i=0;i<9;i++){
                if(board[i]===''){
                    board[i]=playerSymbol;
                    if(checkWinner(playerSymbol)){board[i]='';return i;}
                    board[i]='';
                }
            }
            for(let i=0;i<9;i++){
                if(board[i]===''){
                    board[i]=opponentSymbol;
                    if(checkWinner(opponentSymbol)){board[i]='';return i;}
                    board[i]='';
                }
            }
            if(board[4]==='') return 4;
            for(let c of[0,2,6,8]) if(board[c]==='') return c;
            for(let i=0;i<9;i++) if(board[i]==='') return i;
            return null;
        }

        function checkWinner(symbol){
            const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return p.some(w=>w.every(i=>board[i]===symbol));
        }

        function highlightWinCells(symbol){
            const p=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let w of p){
                if(w.every(i=>board[i]===symbol)){
                    document.querySelectorAll('.cell').forEach((c,i)=>{if(w.includes(i))c.classList.add('win')});
                    break;
                }
            }
        }

        function isBoardFull(){return board.every(c=>c!=='');}
        function highlightCell(i){clearHighlights();document.querySelectorAll('.cell')[i].classList.add('suggestion');}
        function clearHighlights(){document.querySelectorAll('.cell').forEach(c=>c.classList.remove('suggestion','win'));}
        
        function updateBoard(){
            document.querySelectorAll('.cell').forEach((c,i)=>{
                c.textContent=board[i];
                c.className='cell';
                if(board[i]==='X')c.classList.add('x');
                if(board[i]==='O')c.classList.add('o');
            });
        }

        function setStatus(m){document.getElementById('status').textContent=m;}

        function resetGame(){
            board=['','','','','','','','',''];
            updateBoard();
            clearHighlights();
            
            if(currentMode==='ai'){
                gameActive=true;
                playerSymbol='X';opponentSymbol='O';
                waitingForOpponent=false;
                setStatus('🤖 Ваш ход! Вы ✕');
            }else if(currentMode==='friend'){
                gameActive=true;
                playerSymbol='X';opponentSymbol='O';
                waitingForOpponent=false;
                setStatus('👥 Ходит ✕');
            }else if(currentMode==='online'){
                gameActive=true;
                waitingForOpponent=onlinePlayerSymbol==='O';
                setStatus(waitingForOpponent?'🎯 Ход соперника':'🤔 Ваш ход');
                if(!waitingForOpponent) broadcastMove(null);
            }else if(currentMode==='calc'){
                gameActive=false;
                waitingForOpponent=false;
                if(playerSymbol&&firstMove) startCalcGame();
                else setStatus('Выберите символ и кто первый');
            }
        }

        updateBoard();
        if(currentMode==='calc') setStatus('Выберите символ и кто первый');
    </script>
</body>
</html>
