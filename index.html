<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XO Assistant - by Sonki</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg: #0a0a0a;
            --bg2: rgba(10, 10, 20, 0.7);
            --text: rgba(255, 255, 255, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --cell-bg: rgba(20, 20, 30, 0.8);
            --settings-bg: rgba(255, 255, 255, 0.05);
            --status-bg: rgba(255, 255, 255, 0.05);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(255, 255, 255, 0.2);
            --btn-text: rgba(255, 255, 255, 0.7);
            --shadow: 0 0 50px rgba(255, 0, 110, 0.3), 0 0 100px rgba(58, 134, 255, 0.2);
        }

        .light-theme {
            --bg: #f0f2f5;
            --bg2: rgba(255, 255, 255, 0.8);
            --text: #1a1a1a;
            --border: rgba(0, 0, 0, 0.1);
            --cell-bg: #ffffff;
            --settings-bg: rgba(255, 255, 255, 0.8);
            --status-bg: rgba(255, 255, 255, 0.8);
            --btn-bg: #ffffff;
            --btn-border: rgba(0, 0, 0, 0.2);
            --btn-text: #333;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s;
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, #ff006e 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, #3a86ff 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, #8338ec 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #ffbe0b 0%, transparent 50%),
                radial-gradient(ellipse at 20% 20%, #fb5607 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
            opacity: 0.6;
            transition: opacity 0.5s;
        }

        .light-theme .bg-animation {
            opacity: 0.15;
        }

        @keyframes bgShift {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.5) rotate(5deg); }
            100% { transform: scale(1.2) rotate(-5deg); }
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg) scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--bg2);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            backdrop-filter: blur(20px);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow);
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--bg2);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 20px;
            width: 95%;
            max-width: 500px;
            box-shadow: var(--shadow);
            transition: all 0.5s;
            margin: 20px auto;
        }

        .mode-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
            margin-bottom: 15px;
            background: var(--settings-bg);
            border-radius: 12px;
            padding: 3px;
        }

        .mode-tab {
            padding: 10px 4px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--btn-text);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6em;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.2;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, #ff006e, #3a86ff);
            color: white;
        }

        .title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8em;
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #3a86ff, #8338ec, #ffbe0b);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            text-align: center;
            color: var(--btn-text);
            font-size: 0.6em;
            margin-top: -8px;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .settings-block {
            background: var(--settings-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .settings-label {
            color: var(--text);
            font-size: 0.75em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid var(--btn-border);
            border-radius: 12px;
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn.active-x {
            background: linear-gradient(135deg, #ff006e, #ff4d6d);
            border-color: #ff006e;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.4);
        }

        .btn.active-o {
            background: linear-gradient(135deg, #3a86ff, #4d9fff);
            border-color: #3a86ff;
            color: white;
            box-shadow: 0 0 20px rgba(58, 134, 255, 0.4);
        }

        .btn.active-first {
            background: linear-gradient(135deg, #8338ec, #9d5cff);
            border-color: #8338ec;
            color: white;
            box-shadow: 0 0 20px rgba(131, 56, 236, 0.4);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            border: 1px solid var(--border);
            position: relative;
        }

        .board::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff006e, #3a86ff, #8338ec, #ffbe0b);
            z-index: -1;
            animation: borderRotate 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2em;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.x {
            color: #ff006e;
            text-shadow: 0 0 20px rgba(255, 0, 110, 0.8);
            animation: popIn 0.3s ease;
        }

        .cell.o {
            color: #3a86ff;
            text-shadow: 0 0 20px rgba(58, 134, 255, 0.8);
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.suggestion {
            animation: suggestGlow 1s ease-in-out infinite;
            border-color: #ffbe0b !important;
            background: rgba(255, 190, 11, 0.2) !important;
        }

        @keyframes suggestGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 190, 11, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 190, 11, 0.8); }
        }

        .cell.win {
            animation: winCelebrate 0.4s ease-in-out infinite alternate;
        }

        @keyframes winCelebrate {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); box-shadow: 0 0 40px rgba(255, 255, 255, 0.6); }
        }

        .status {
            text-align: center;
            padding: 12px;
            margin: 12px 0;
            background: var(--status-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.75em;
            font-weight: 500;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .room-info {
            text-align: center;
            color: var(--text);
            font-size: 0.65em;
            margin: 8px 0;
            padding: 10px;
            background: var(--settings-bg);
            border-radius: 10px;
            word-break: break-all;
        }

        .copy-btn {
            display: inline-block;
            padding: 6px 12px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--btn-text);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65em;
            margin: 5px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            border-color: #ff006e;
            color: #ff006e;
        }

        .join-input {
            padding: 10px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7em;
            text-align: center;
            width: 100%;
            margin: 5px 0;
            outline: none;
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: var(--btn-bg);
            border: 2px solid var(--btn-border);
            border-radius: 12px;
            color: var(--btn-text);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            border-color: #ff006e;
            color: #ff006e;
        }

        .footer {
            text-align: center;
            margin-top: 12px;
            color: var(--btn-text);
            font-size: 0.6em;
            letter-spacing: 3px;
            opacity: 0.5;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 400px) {
            .container {
                padding: 15px;
                border-radius: 18px;
            }
            .title {
                font-size: 1.6em;
            }
            .cell {
                font-size: 1.8em;
                border-radius: 10px;
            }
            .btn {
                font-size: 0.65em;
                padding: 10px 6px;
            }
            .mode-tab {
                font-size: 0.5em;
                padding: 8px 2px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <div class="bg-animation"></div>
    <div class="confetti-container" id="confetti"></div>

    <div class="container">
        <div class="title">XO</div>
        <div class="subtitle">ASSISTANT</div>

        <div class="mode-tabs">
            <button class="mode-tab active" id="tabCalc" onclick="switchMode('calc')">🧮<br>Ассистент</button>
            <button class="mode-tab" id="tabAI" onclick="switchMode('ai')">🤖<br>ИИ</button>
            <button class="mode-tab" id="tabFriend" onclick="switchMode('friend')">👥<br>Передача</button>
            <button class="mode-tab" id="tabOnline" onclick="switchMode('online')">🌐<br>По коду</button>
        </div>

        <div id="settingsSection">
            <div class="settings-block" id="symbolBlock">
                <div class="settings-label">🎮 Вы играете за</div>
                <div class="button-row">
                    <button class="btn" id="btnX" onclick="chooseSymbol('X')">✕ Крестик</button>
                    <button class="btn" id="btnO" onclick="chooseSymbol('O')">○ Нолик</button>
                </div>
            </div>

            <div class="settings-block" id="firstMoveBlock">
                <div class="settings-label">👑 Первый ход</div>
                <div class="button-row">
                    <button class="btn" id="btnMe" onclick="chooseFirst('me')">Я</button>
                    <button class="btn" id="btnOpp" onclick="chooseFirst('opp')">Соперник</button>
                </div>
            </div>
        </div>

        <div class="room-info hidden" id="roomInfo"></div>

        <div class="board" id="board">
            <div class="cell" onclick="cellClick(0)"></div>
            <div class="cell" onclick="cellClick(1)"></div>
            <div class="cell" onclick="cellClick(2)"></div>
            <div class="cell" onclick="cellClick(3)"></div>
            <div class="cell" onclick="cellClick(4)"></div>
            <div class="cell" onclick="cellClick(5)"></div>
            <div class="cell" onclick="cellClick(6)"></div>
            <div class="cell" onclick="cellClick(7)"></div>
            <div class="cell" onclick="cellClick(8)"></div>
        </div>

        <div class="status" id="status">Выберите режим</div>

        <button class="reset-btn" onclick="resetGame()">🔄 Новая игра</button>
        
        <div class="footer">made by sonki</div>
    </div>

    <script>
        // Конфетти
        function spawnConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#ff006e', '#3a86ff', '#8338ec', '#ffbe0b', '#fb5607', '#00f5d4'];
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + '%';
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    c.style.width = (Math.random() * 10 + 5) + 'px';
                    c.style.height = (Math.random() * 10 + 5) + 'px';
                    c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    container.appendChild(c);
                    setTimeout(() => c.remove(), 3000);
                }, i * 15);
            }
        }

        // Тема
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.className = isDark ? '' : 'light-theme';
            document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'light') {
            isDark = false;
            document.body.className = 'light-theme';
            document.getElementById('themeBtn').textContent = '☀️';
        }

        // Игра
        let playerSymbol = null;
        let opponentSymbol = null;
        let firstMove = null;
        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = false;
        let waitingForOpponent = false;
        let currentMode = 'calc';
        let onlineRoom = null;
        let isHost = false;
        let encodedBoard = null;

        function switchMode(mode) {
            currentMode = mode;
            ['tabCalc','tabAI','tabFriend','tabOnline'].forEach(id => {
                document.getElementById(id).className = id === 'tab'+mode.charAt(0).toUpperCase()+mode.slice(1) ? 'mode-tab active' : 'mode-tab';
            });
            
            const symbolBlock = document.getElementById('symbolBlock');
            const firstMoveBlock = document.getElementById('firstMoveBlock');
            const roomInfo = document.getElementById('roomInfo');
            
            if (mode === 'ai') {
                symbolBlock.classList.add('hidden');
                firstMoveBlock.classList.add('hidden');
                roomInfo.classList.add('hidden');
                playerSymbol = 'X';
                opponentSymbol = 'O';
                document.getElementById('btnX').className = 'btn active-x';
                document.getElementById('btnO').className = 'btn';
            } else if (mode === 'online') {
                symbolBlock.classList.add('hidden');
                firstMoveBlock.classList.add('hidden');
                roomInfo.classList.remove('hidden');
                initOnlineMode();
            } else {
                symbolBlock.classList.remove('hidden');
                firstMoveBlock.classList.remove('hidden');
                roomInfo.classList.add('hidden');
            }
            
            resetGame();
        }

        function initOnlineMode() {
            const roomInfo = document.getElementById('roomInfo');
            const existingRoom = new URLSearchParams(window.location.search).get('room');
            
            if (existingRoom) {
                // Присоединяемся к комнате
                try {
                    const data = JSON.parse(atob(existingRoom));
                    onlineRoom = existingRoom;
                    isHost = false;
                    playerSymbol = data.opponent === 'X' ? 'O' : 'X';
                    opponentSymbol = data.opponent;
                    board = data.board || ['', '', '', '', '', '', '', '', ''];
                    firstMove = data.turn === playerSymbol ? 'me' : 'opp';
                    
                    roomInfo.innerHTML = `
                        🔗 Присоединились к игре<br>
                        Вы: <b>${playerSymbol}</b> | Соперник: <b>${opponentSymbol}</b>
                        <br><small>Обновляйте страницу для хода</small>
                    `;
                    
                    updateBoard();
                    startOnlineGame();
                } catch(e) {
                    roomInfo.innerHTML = '❌ Неверный код комнаты';
                }
            } else {
                // Создаём комнату
                isHost = true;
                playerSymbol = 'X';
                opponentSymbol = 'O';
                board = ['', '', '', '', '', '', '', '', ''];
                firstMove = 'me';
                
                generateRoomLink();
            }
        }

        function generateRoomLink() {
            const data = {
                board: board,
                opponent: opponentSymbol,
                turn: 'me'
            };
            onlineRoom = btoa(JSON.stringify(data));
            const link = window.location.origin + window.location.pathname + '?room=' + onlineRoom;
            
            document.getElementById('roomInfo').innerHTML = `
                Вы: <b>${playerSymbol}</b> | Соперник: <b>${opponentSymbol}</b><br>
                <input class="join-input" value="${link}" readonly onclick="this.select()">
                <button class="copy-btn" onclick="copyLink()">📋 Копировать</button>
                <br><small>Отправьте ссылку другу и обновляйте страницу после хода</small>
            `;
        }

        function copyLink() {
            const input = document.querySelector('.join-input');
            input.select();
            navigator.clipboard.writeText(input.value);
            setStatus('✅ Ссылка скопирована!');
        }

        function startOnlineGame() {
            gameActive = true;
            updateBoard();
            clearHighlights();
            
            if (firstMove === 'opp') {
                setStatus('🎯 Ожидайте ход соперника и обновите страницу');
                waitingForOpponent = true;
            } else {
                setStatus('🤔 Ваш ход! После хода скопируйте новую ссылку');
            }
        }

        function chooseSymbol(symbol) {
            if (gameActive || currentMode === 'ai' || currentMode === 'online') return;
            playerSymbol = symbol;
            opponentSymbol = symbol === 'X' ? 'O' : 'X';
            document.getElementById('btnX').className = symbol === 'X' ? 'btn active-x' : 'btn';
            document.getElementById('btnO').className = symbol === 'O' ? 'btn active-o' : 'btn';
            if (firstMove && currentMode === 'calc') startGame();
        }

        function chooseFirst(who) {
            if (gameActive || currentMode === 'ai' || currentMode === 'online') return;
            firstMove = who;
            document.getElementById('btnMe').className = who === 'me' ? 'btn active-first' : 'btn';
            document.getElementById('btnOpp').className = who === 'opp' ? 'btn active-first' : 'btn';
            if (playerSymbol) startGame();
        }

        function startGame() {
            gameActive = true;
            board = ['', '', '', '', '', '', '', '', ''];
            waitingForOpponent = false;
            updateBoard();
            clearHighlights();
            
            if (currentMode === 'ai') {
                setStatus('🤖 Ваш ход! Вы играете за ✕');
            } else if (currentMode === 'calc') {
                if (firstMove === 'opp') {
                    setStatus('🎯 Нажмите на клетку, куда пошёл соперник');
                    waitingForOpponent = true;
                } else {
                    setStatus('🤔 Анализирую...');
                    setTimeout(() => makePlayerMove(), 500);
                }
            }
        }

        function cellClick(index) {
            if (!gameActive) return;
            if (board[index] !== '') {
                setStatus('⚠️ Клетка занята!');
                return;
            }

            if (currentMode === 'ai') {
                board[index] = playerSymbol;
                updateBoard();
                clearHighlights();
                
                if (checkWinner(playerSymbol)) {
                    highlightWinCells(playerSymbol);
                    setStatus('🎉 Вы выиграли!');
                    spawnConfetti();
                    gameActive = false;
                    return;
                }
                if (isBoardFull()) { setStatus('🤝 Ничья!'); gameActive = false; return; }
                
                setStatus('🤖 ИИ думает...');
                setTimeout(() => {
                    const move = getAIMove();
                    if (move !== null) {
                        board[move] = opponentSymbol;
                        updateBoard();
                        if (checkWinner(opponentSymbol)) {
                            highlightWinCells(opponentSymbol);
                            setStatus('😞 ИИ выиграл!');
                            gameActive = false;
                        } else if (isBoardFull()) {
                            setStatus('🤝 Ничья!');
                            gameActive = false;
                        } else {
                            setStatus('🤖 Ваш ход!');
                        }
                    }
                }, 400);
                return;
            }

            if (currentMode === 'friend') {
                if (!playerSymbol) {
                    setStatus('⚠️ Сначала выберите символ!');
                    return;
                }
                if (board[index] === '') {
                    board[index] = waitingForOpponent ? opponentSymbol : playerSymbol;
                    waitingForOpponent = !waitingForOpponent;
                    updateBoard();
                    
                    if (checkWinner(board[index])) {
                        highlightWinCells(board[index]);
                        setStatus(board[index] === playerSymbol ? '🎉 Вы выиграли!' : '😞 Соперник выиграл');
                        spawnConfetti();
                        gameActive = false;
                        return;
                    }
                    if (isBoardFull()) { setStatus('🤝 Ничья!'); gameActive = false; return; }
                    setStatus(waitingForOpponent ? '🎯 Ход соперника' : '🤔 Ваш ход');
                }
                return;
            }

            if (currentMode === 'online') {
                board[index] = playerSymbol;
                updateBoard();
                
                if (checkWinner(playerSymbol)) {
                    highlightWinCells(playerSymbol);
                    setStatus('🎉 Вы выиграли!');
                    spawnConfetti();
                    gameActive = false;
                    return;
                }
                if (isBoardFull()) { setStatus('🤝 Ничья!'); gameActive = false; return; }
                
                // Генерируем новую ссылку для соперника
                const data = {
                    board: board,
                    opponent: playerSymbol,
                    turn: 'opp'
                };
                onlineRoom = btoa(JSON.stringify(data));
                const link = window.location.origin + window.location.pathname + '?room=' + onlineRoom;
                
                document.getElementById('roomInfo').innerHTML = `
                    Ход сделан! Отправьте ссылку сопернику:<br>
                    <input class="join-input" value="${link}" readonly onclick="this.select()">
                    <button class="copy-btn" onclick="copyLink()">📋 Копировать</button>
                `;
                setStatus('✅ Скопируйте ссылку и отправьте сопернику');
                gameActive = false;
                return;
            }

            if (currentMode === 'calc' && waitingForOpponent) {
                board[index] = opponentSymbol;
                updateBoard();
                waitingForOpponent = false;
                clearHighlights();
                
                if (checkWinner(opponentSymbol)) { highlightWinCells(opponentSymbol); setStatus('😞 Соперник выиграл'); gameActive = false; return; }
                if (isBoardFull()) { setStatus('🤝 Ничья!'); gameActive = false; return; }
                
                setStatus('🧠 Просчитываю...');
                setTimeout(() => makePlayerMove(), 400);
            }
        }

        function makePlayerMove() {
            if (!gameActive) return;
            const move = getBestMove();
            if (move !== null) {
                highlightCell(move);
                setStatus('💡 Ходите на подсвеченную клетку');
                setTimeout(() => {
                    board[move] = playerSymbol;
                    updateBoard();
                    clearHighlights();
                    if (checkWinner(playerSymbol)) { highlightWinCells(playerSymbol); setStatus('🎉 Вы выиграли!'); spawnConfetti(); gameActive = false; return; }
                    if (isBoardFull()) { setStatus('🤝 Ничья!'); gameActive = false; return; }
                    setStatus('🎯 Нажмите на клетку соперника');
                    waitingForOpponent = true;
                }, 800);
            }
        }

        function getAIMove() {
            if (Math.random() < 0.3) {
                const empty = [];
                for (let i = 0; i < 9; i++) if (board[i] === '') empty.push(i);
                if (empty.length) return empty[Math.floor(Math.random() * empty.length)];
            }
            return getBestMove();
        }

        function getBestMove() {
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = playerSymbol;
                    if (checkWinner(playerSymbol)) { board[i] = ''; return i; }
                    board[i] = '';
                }
            }
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = opponentSymbol;
                    if (checkWinner(opponentSymbol)) { board[i] = ''; return i; }
                    board[i] = '';
                }
            }
            if (board[4] === '') return 4;
            for (let c of [0, 2, 6, 8]) if (board[c] === '') return c;
            for (let i = 0; i < 9; i++) if (board[i] === '') return i;
            return null;
        }

        function checkWinner(symbol) {
            const p = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return p.some(w => w.every(i => board[i] === symbol));
        }

        function highlightWinCells(symbol) {
            const p = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let w of p) {
                if (w.every(i => board[i] === symbol)) {
                    document.querySelectorAll('.cell').forEach((c,i) => { if (w.includes(i)) c.classList.add('win'); });
                    break;
                }
            }
        }

        function isBoardFull() { return board.every(c => c !== ''); }
        function highlightCell(i) { clearHighlights(); document.querySelectorAll('.cell')[i].classList.add('suggestion'); }
        function clearHighlights() { document.querySelectorAll('.cell').forEach(c => c.classList.remove('suggestion','win')); }
        
        function updateBoard() {
            document.querySelectorAll('.cell').forEach((c,i) => {
                c.textContent = board[i];
                c.className = 'cell';
                if (board[i] === 'X') c.classList.add('x');
                if (board[i] === 'O') c.classList.add('o');
            });
        }

        function setStatus(m) { document.getElementById('status').textContent = m; }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = false;
            waitingForOpponent = false;
            
            if (currentMode !== 'ai' && currentMode !== 'online') {
                playerSymbol = null;
                opponentSymbol = null;
                firstMove = null;
                document.getElementById('btnX').className = 'btn';
                document.getElementById('btnO').className = 'btn';
                document.getElementById('btnMe').className = 'btn';
                document.getElementById('btnOpp').className = 'btn';
            }
            
            updateBoard();
            clearHighlights();
            
            if (currentMode === 'ai') {
                setStatus('🤖 Нажмите на клетку для хода');
            } else if (currentMode === 'online') {
                initOnlineMode();
            } else {
                setStatus('Выберите символ и кто ходит первым');
            }
        }
    </script>
</body>
</html>
